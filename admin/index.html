function formatBRL(v) {
  const n = Number(v) || 0;
  return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}
function formatDateBR(str) {
  if (!str) return "—";
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("pt-BR");
}
function todayISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

/* ============================================================
   LOGIN DO ADMIN
============================================================ */
function AdminLogin({ onAuthed }) {
  const [email, setEmail] = useState("");
  const [senha, setSenha] = useState("");
  const [carregando, setCarregando] = useState(false);
  const [erro, setErro] = useState("");

  async function handleLogin() {
    setErro("");
    if (!email.trim() || !senha) { setErro("Preencha e-mail e senha."); return; }
    setCarregando(true);
    const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password: senha });
    if (error) { setErro("E-mail ou senha incorretos."); setCarregando(false); return; }
    const { data: souAdmin } = await sb.from("admins").select("id").eq("id", data.user.id).maybeSingle();
    if (!souAdmin) {
      setErro("Essa conta não tem acesso de administrador.");
      await sb.auth.signOut();
      setCarregando(false);
      return;
    }
    onAuthed();
    setCarregando(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6" style={{ background: `linear-gradient(160deg, ${BRAND.azul}, ${BRAND.azulEscuro})` }}>
      <div className="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
        <div className="flex flex-col items-center mb-6">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-3 text-3xl" style={{ background: `linear-gradient(135deg, ${BRAND.azul}, ${BRAND.roxo})` }}>🛠️</div>
          <h1 className="fredoka text-2xl font-bold text-center" style={{ color: BRAND.azul }}>Painel Admin</h1>
          <p className="text-sm text-slate-400 text-center mt-1">Pegue &amp; Monte · acesso restrito</p>
        </div>
        <label className="block mb-4">
          <span className="block text-sm font-semibold mb-1.5" style={{ color: BRAND.tinta }}>E-mail</span>
          <input className="w-full rounded-xl border-2 border-slate-200 px-4 py-2.5 text-[15px] outline-none focus:border-[#3D5AFE]" value={email} onChange={(e) => setEmail(e.target.value)} type="email" />
        </label>
        <label className="block mb-4">
          <span className="block text-sm font-semibold mb-1.5" style={{ color: BRAND.tinta }}>Senha</span>
          <input className="w-full rounded-xl border-2 border-slate-200 px-4 py-2.5 text-[15px] outline-none focus:border-[#3D5AFE]" value={senha} onChange={(e) => setSenha(e.target.value)} type="password" onKeyDown={(e) => e.key === "Enter" && handleLogin()} />
        </label>
        {erro && <div className="text-sm font-semibold mb-4 px-3 py-2.5 rounded-xl" style={{ background: BRAND.rosa + "15", color: BRAND.rosa }}>⚠️ {erro}</div>}
        <button disabled={carregando} onClick={handleLogin} className="w-full py-3 rounded-xl font-bold text-white cursor-pointer disabled:opacity-60" style={{ background: BRAND.azul }}>
          {carregando ? "Entrando..." : "Entrar"}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   LISTA DE DECORADORAS + CONTROLE DE ACESSO
============================================================ */
function DecoradorasLista() {
  const [lista, setLista] = useState([]);
  const [carregando, setCarregando] = useState(true);
  const [busca, setBusca] = useState("");
  const [salvandoId, setSalvandoId] = useState(null);

  const carregar = useCallback(async () => {
    setCarregando(true);
    const { data, error } = await sb.from("decoradoras").select("*").order("created_at", { ascending: false });
    if (!error) setLista(data || []);
    setCarregando(false);
  }, []);

  useEffect(() => { carregar(); }, [carregar]);

  async function mudarStatus(id, novoStatus) {
    setSalvandoId(id);
    const payload = { plano_status: novoStatus };
    if (novoStatus === "trial") payload.trial_fim = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);
    const { error } = await sb.from("decoradoras").update(payload).eq("id", id);
    if (!error) setLista((l) => l.map((d) => (d.id === id ? { ...d, ...payload } : d)));
    setSalvandoId(null);
  }

  const filtrada = lista.filter((d) => !busca.trim() || (d.nome_loja || "").toLowerCase().includes(busca.toLowerCase()) || (d.email || "").toLowerCase().includes(busca.toLowerCase()));

  if (carregando) return <div className="text-center py-10 text-slate-400">Carregando decoradoras...</div>;

  return (
    <div>
      <input className="w-full rounded-xl border-2 border-slate-200 px-4 py-2.5 text-sm mb-4" placeholder="🔎 Buscar por nome da loja ou e-mail..." value={busca} onChange={(e) => setBusca(e.target.value)} />
      <div className="space-y-2">
        {filtrada.map((d) => {
          const trialDiasRestantes = d.plano_status === "trial" ? Math.ceil((new Date(d.trial_fim) - new Date(todayISO())) / 86400000) : null;
          return (
            <div key={d.id} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-wrap items-center gap-3">
              <div className="min-w-0 flex-1">
                <p className="font-bold truncate" style={{ color: BRAND.tinta }}>{d.nome_loja}</p>
                <p className="text-xs text-slate-400 truncate">{d.email || "sem e-mail registrado"}</p>
              </div>
              <Pill color={STATUS_CORES[d.plano_status] || BRAND.tinta}>
                {STATUS_LABELS[d.plano_status] || d.plano_status}
                {d.plano_status === "trial" && ` · ${trialDiasRestantes >= 0 ? trialDiasRestantes + "d restantes" : "expirado"}`}
              </Pill>
              <select
                disabled={salvandoId === d.id}
                value={d.plano_status}
                onChange={(e) => mudarStatus(d.id, e.target.value)}
                className="text-xs font-bold rounded-lg border-2 border-slate-200 px-2 py-1.5 cursor-pointer"
              >
                {Object.entries(STATUS_LABELS).map(([v, l]) => <option key={v} value={v}>{l}</option>)}
              </select>
            </div>
          );
        })}
        {filtrada.length === 0 && <p className="text-sm text-slate-400 text-center py-6">Nenhuma decoradora encontrada.</p>}
      </div>
    </div>
  );
}

/* ============================================================
   RELATÓRIOS (ranking de produtos e faturamento por decoradora)
============================================================ */
function Relatorios() {
  const [ranking, setRanking] = useState(null);
  const [faturamento, setFaturamento] = useState(null);
  const [erro, setErro] = useState("");

  useEffect(() => {
    (async () => {
      const r1 = await sb.rpc("ranking_produtos_geral");
      const r2 = await sb.rpc("faturamento_por_decoradora");
      if (r1.error || r2.error) setErro((r1.error && r1.error.message) || (r2.error && r2.error.message));
      setRanking(r1.data || []);
      setFaturamento(r2.data || []);
    })();
  }, []);

  if (erro) return <div className="text-sm font-semibold px-4 py-3 rounded-xl" style={{ background: BRAND.rosa + "15", color: BRAND.rosa }}>⚠️ {erro}</div>;
  if (!ranking || !faturamento) return <div className="text-center py-10 text-slate-400">Carregando relatórios...</div>;

  const faturamentoTotal = faturamento.reduce((s, f) => s + Number(f.valor_total || 0), 0);

  return (
    <div className="grid lg:grid-cols-2 gap-5">
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <p className="font-bold text-sm mb-1" style={{ color: BRAND.tinta }}>Faturamento por decoradora</p>
        <p className="text-xs text-slate-400 mb-4">Total de todas: {formatBRL(faturamentoTotal)}</p>
        <div className="space-y-2">
          {faturamento.map((f) => (
            <div key={f.decoradora_id} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
              <div className="min-w-0">
                <p className="font-semibold text-sm truncate" style={{ color: BRAND.tinta }}>{f.nome_loja}</p>
                <p className="text-xs text-slate-400">{f.total_contratos} contrato{f.total_contratos === 1 ? "" : "s"}</p>
              </div>
              <span className="font-bold text-sm shrink-0" style={{ color: BRAND.azul }}>{formatBRL(f.valor_total)}</span>
            </div>
          ))}
          {faturamento.length === 0 && <p className="text-sm text-slate-400">Nenhum dado ainda.</p>}
        </div>
      </div>
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <p className="font-bold text-sm mb-4" style={{ color: BRAND.tinta }}>Produtos mais pedidos (todas as decoradoras)</p>
        <div className="space-y-2">
          {ranking.slice(0, 10).map((r, i) => (
            <div key={i} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
              <div className="min-w-0">
                <p className="font-semibold text-sm truncate" style={{ color: BRAND.tinta }}>{r.produto_nome || "Sem nome"}</p>
                <p className="text-xs text-slate-400">{TIPO_SERVICO_LABELS_ADMIN[r.tipo_servico] || r.tipo_servico}</p>
              </div>
              <span className="font-bold text-sm shrink-0" style={{ color: BRAND.rosa }}>{r.quantidade}x</span>
            </div>
          ))}
          {ranking.length === 0 && <p className="text-sm text-slate-400">Nenhum dado ainda.</p>}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   CONFIGURAÇÕES (suporte, vídeos, FAQ, comunidade)
============================================================ */
function ConfiguracoesTab() {
  const [config, setConfig] = useState(null);
  const [salvando, setSalvando] = useState(false);
  const [salvo, setSalvo] = useState(false);
  const [novoVideoTitulo, setNovoVideoTitulo] = useState("");
  const [novoVideoUrl, setNovoVideoUrl] = useState("");
  const [novaPergunta, setNovaPergunta] = useState("");
  const [novaResposta, setNovaResposta] = useState("");

  useEffect(() => {
    sb.from("app_config").select("*").eq("id", 1).maybeSingle().then(({ data }) => setConfig(data || { suporte_whatsapp: "", suporte_mensagem: "", comunidade_link: "", videos: [], faq: [] }));
  }, []);

  function set(campo, valor) { setConfig((c) => ({ ...c, [campo]: valor })); setSalvo(false); }

  async function salvar() {
    setSalvando(true);
    const { error } = await sb.from("app_config").update({
      suporte_whatsapp: config.suporte_whatsapp, suporte_mensagem: config.suporte_mensagem,
      comunidade_link: config.comunidade_link, videos: config.videos, faq: config.faq,
    }).eq("id", 1);
    setSalvando(false);
    if (!error) setSalvo(true);
  }

  function adicionarVideo() {
    if (!novoVideoTitulo.trim() || !novoVideoUrl.trim()) return;
    set("videos", [...(config.videos || []), { titulo: novoVideoTitulo.trim(), url: novoVideoUrl.trim() }]);
    setNovoVideoTitulo(""); setNovoVideoUrl("");
  }
  function removerVideo(i) { set("videos", config.videos.filter((_, idx) => idx !== i)); }

  function adicionarFaq() {
    if (!novaPergunta.trim() || !novaResposta.trim()) return;
    set("faq", [...(config.faq || []), { pergunta: novaPergunta.trim(), resposta: novaResposta.trim() }]);
    setNovaPergunta(""); setNovaResposta("");
  }
  function removerFaq(i) { set("faq", config.faq.filter((_, idx) => idx !== i)); }

  if (!config) return <div className="text-center py-10 text-slate-400">Carregando...</div>;

  return (
    <div className="space-y-5">
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <p className="font-bold text-sm mb-3" style={{ color: BRAND.tinta }}>💬 Suporte</p>
        <label className="block mb-3">
          <span className="block text-xs font-semibold mb-1" style={{ color: BRAND.tinta }}>WhatsApp de suporte (com DDD)</span>
          <input className="w-full rounded-xl border-2 border-slate-200 px-3 py-2 text-sm" value={config.suporte_whatsapp || ""} onChange={(e) => set("suporte_whatsapp", e.target.value)} placeholder="(61) 99999-8888" />
        </label>
        <label className="block">
          <span className="block text-xs font-semibold mb-1" style={{ color: BRAND.tinta }}>Mensagem inicial</span>
          <input className="w-full rounded-xl border-2 border-slate-200 px-3 py-2 text-sm" value={config.suporte_mensagem || ""} onChange={(e) => set("suporte_mensagem", e.target.value)} placeholder="Olá! Preciso de ajuda com o app." />
        </label>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <p className="font-bold text-sm mb-3" style={{ color: BRAND.tinta }}>🗺️ Comunidade</p>
        <label className="block">
          <span className="block text-xs font-semibold mb-1" style={{ color: BRAND.tinta }}>Link do grupo (WhatsApp, Telegram, etc.)</span>
          <input className="w-full rounded-xl border-2 border-slate-200 px-3 py-2 text-sm" value={config.comunidade_link || ""} onChange={(e) => set("comunidade_link", e.target.value)} placeholder="https://chat.whatsapp.com/..." />
        </label>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <p className="font-bold text-sm mb-3" style={{ color: BRAND.tinta }}>🎬 Vídeos ("Aprenda mais")</p>
        <div className="space-y-2 mb-3">
          {(config.videos || []).map((v, i) => (
            <div key={i} className="flex items-center justify-between text-sm bg-slate-50 rounded-lg px-3 py-2">
              <span className="truncate">{v.titulo} — <span className="text-slate-400">{v.url}</span></span>
              <button onClick={() => removerVideo(i)} className="text-rose-400 cursor-pointer shrink-0 ml-2">🗑</button>
            </div>
          ))}
          {(!config.videos || config.videos.length === 0) && <p className="text-xs text-slate-400">Nenhum vídeo cadastrado.</p>}
        </div>
        <div className="grid sm:grid-cols-3 gap-2">
          <input className="sm:col-span-1 rounded-xl border-2 border-slate-200 px-3 py-2 text-sm" placeholder="Título" value={novoVideoTitulo} onChange={(e) => setNovoVideoTitulo(e.target.value)} />
          <input className="sm:col-span-1 rounded-xl border-2 border-slate-200 px-3 py-2 text-sm" placeholder="Link do vídeo (YouTube, Drive...)" value={novoVideoUrl} onChange={(e) => setNovoVideoUrl(e.target.value)} />
          <button onClick={adicionarVideo} className="px-3 py-2 rounded-xl font-bold text-white text-sm cursor-pointer" style={{ background: BRAND.azul }}>+ Adicionar</button>
        </div>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <p className="font-bold text-sm mb-3" style={{ color: BRAND.tinta }}>🧩 Problemas e Soluções (FAQ)</p>
        <div className="space-y-2 mb-3">
          {(config.faq || []).map((f, i) => (
            <div key={i} className="flex items-start justify-between text-sm bg-slate-50 rounded-lg px-3 py-2">
              <div><p className="font-semibold">{f.pergunta}</p><p className="text-slate-400 text-xs mt-0.5">{f.resposta}</p></div>
              <button onClick={() => removerFaq(i)} className="text-rose-400 cursor-pointer shrink-0 ml-2">🗑</button>
            </div>
          ))}
          {(!config.faq || config.faq.length === 0) && <p className="text-xs text-slate-400">Nenhuma pergunta cadastrada.</p>}
        </div>
        <input className="w-full rounded-xl border-2 border-slate-200 px-3 py-2 text-sm mb-2" placeholder="Pergunta" value={novaPergunta} onChange={(e) => setNovaPergunta(e.target.value)} />
        <textarea className="w-full rounded-xl border-2 border-slate-200 px-3 py-2 text-sm mb-2" rows={2} placeholder="Resposta" value={novaResposta} onChange={(e) => setNovaResposta(e.target.value)} />
        <button onClick={adicionarFaq} className="px-3 py-2 rounded-xl font-bold text-white text-sm cursor-pointer" style={{ background: BRAND.azul }}>+ Adicionar pergunta</button>
      </div>

      <button disabled={salvando} onClick={salvar} className="w-full py-3 rounded-xl font-bold text-white cursor-pointer disabled:opacity-60" style={{ background: BRAND.rosa }}>
        {salvando ? "Salvando..." : salvo ? "✅ Salvo!" : "Salvar configurações"}
      </button>
    </div>
  );
}

function AdminApp() {
  const [session, setSession] = useState(undefined);
  const [autorizado, setAutorizado] = useState(false);
  const [aba, setAba] = useState("decoradoras");

  useEffect(() => {
    sb.auth.getSession().then(async ({ data }) => {
      setSession(data.session);
      if (data.session) {
        const { data: souAdmin } = await sb.from("admins").select("id").eq("id", data.session.user.id).maybeSingle();
        setAutorizado(!!souAdmin);
      }
    });
    const { data: listener } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => listener.subscription.unsubscribe();
  }, []);

  async function handleLogout() { await sb.auth.signOut(); setAutorizado(false); }

  if (session === undefined) return <div className="min-h-screen flex items-center justify-center" style={{ background: BRAND.azul }}><span className="text-white">Carregando...</span></div>;
  if (!session || !autorizado) return <AdminLogin onAuthed={() => setAutorizado(true)} />;

  return (
    <div className="min-h-screen" style={{ background: BRAND.bg }}>
      <div className="sticky top-0 z-20 text-white" style={{ background: `linear-gradient(120deg, ${BRAND.azul}, ${BRAND.azulEscuro})` }}>
        <div className="max-w-5xl mx-auto px-5 py-4 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-xl">🛠️</span>
            <p className="fredoka font-bold">Painel Admin</p>
          </div>
          <button onClick={handleLogout} className="p-2 rounded-full hover:bg-white/10 cursor-pointer">🚪</button>
        </div>
      </div>
      <div className="max-w-5xl mx-auto px-5 py-7">
        <div className="flex gap-2 mb-6">
          <button onClick={() => setAba("decoradoras")} className="px-4 py-2 rounded-xl text-sm font-bold cursor-pointer" style={aba === "decoradoras" ? { background: BRAND.azul, color: "#fff" } : { background: "#fff", color: BRAND.tinta }}>Decoradoras</button>
          <button onClick={() => setAba("relatorios")} className="px-4 py-2 rounded-xl text-sm font-bold cursor-pointer" style={aba === "relatorios" ? { background: BRAND.azul, color: "#fff" } : { background: "#fff", color: BRAND.tinta }}>Relatórios</button>
          <button onClick={() => setAba("configuracoes")} className="px-4 py-2 rounded-xl text-sm font-bold cursor-pointer" style={aba === "configuracoes" ? { background: BRAND.azul, color: "#fff" } : { background: "#fff", color: BRAND.tinta }}>Configurações</button>
        </div>
        {aba === "decoradoras" ? <DecoradorasLista /> : aba === "relatorios" ? <Relatorios /> : <ConfiguracoesTab />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);
</script>
