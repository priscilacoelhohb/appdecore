function hexShade(hex, percent) {
  try {
    const h = hex.replace("#", "");
    const num = parseInt(h.length === 3 ? h.split("").map((c) => c + c).join("") : h, 16);
    let r = (num >> 16) & 0xff, g = (num >> 8) & 0xff, b = num & 0xff;
    const amt = Math.round(2.55 * percent);
    r = Math.min(255, Math.max(0, r + amt)); g = Math.min(255, Math.max(0, g + amt)); b = Math.min(255, Math.max(0, b + amt));
    return "#" + [r, g, b].map((v) => v.toString(16).padStart(2, "0")).join("");
  } catch (e) { return hex; }
}

function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function normalizeStr(s) { return (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }
function parseValorBR(v) {
  if (typeof v === "number") return v;
  if (!v) return 0;
  let s = String(v).trim();
  if (s.includes(",")) s = s.replace(/\./g, "").replace(",", ".");
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function formatBRL(v) { return parseValorBR(v).toLocaleString("pt-BR", { style: "currency", currency: "BRL" }); }
function parseDateLocal(str) { if (!str) return null; const [y, m, d] = str.split("-").map(Number); return new Date(y, m - 1, d); }
function formatDateBR(str) { const d = parseDateLocal(str); return d ? d.toLocaleDateString("pt-BR") : ""; }
const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
function formatDateLong(str) { const d = parseDateLocal(str); if (!d) return ""; return `${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`; }
function todayISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function computeFinance(c) {
  const valor = parseValorBR(c.valor);
  let pago = 0;
  if (c.statusPagamento === "pago") pago = valor;
  else if (c.statusPagamento === "sinal") pago = valor * 0.5;
  return { valor, pago, pendente: Math.max(valor - pago, 0) };
}
function onlyDigits(str) { return (str || "").replace(/\D/g, ""); }
function whatsappLink(phoneRaw, message) {
  let digits = onlyDigits(phoneRaw);
  if (digits.length <= 11) digits = "55" + digits;
  return `https://wa.me/${digits}?text=${encodeURIComponent(message)}`;
}

/* ============================================================
   TELA DE LOGIN / CADASTRO (autenticação real via Supabase Auth)
============================================================ */
function AuthScreen({ onAuthed }) {
  const [modo, setModo] = useState("login"); // login | cadastro
  const [nomeLoja, setNomeLoja] = useState("");
  const [email, setEmail] = useState("");
  const [senha, setSenha] = useState("");
  const [carregando, setCarregando] = useState(false);
  const [erro, setErro] = useState("");
  const [aviso, setAviso] = useState("");

  async function handleCadastro() {
    setErro(""); setAviso("");
    if (!nomeLoja.trim()) { setErro("Digite o nome da sua loja."); return; }
    if (!email.trim()) { setErro("Digite seu e-mail."); return; }
    if (senha.length < 6) { setErro("A senha precisa ter pelo menos 6 caracteres."); return; }
    setCarregando(true);
    try {
      const { data, error } = await sb.auth.signUp({ email: email.trim(), password: senha });
      if (error) { setErro(traduzErroAuth(error)); setCarregando(false); return; }
      if (data.session) {
        // Confirmação de e-mail desligada: já entra direto e cria o perfil da loja.
        await sb.from("decoradoras").insert({ id: data.user.id, nome_loja: nomeLoja.trim() });
        onAuthed();
      } else {
        setAviso("Conta criada! Verifique seu e-mail para confirmar o cadastro e depois faça login.");
        setModo("login");
      }
    } catch (err) {
      setErro("Erro inesperado: " + err.message);
    }
    setCarregando(false);
  }

  async function handleLogin() {
    setErro(""); setAviso("");
    if (!email.trim() || !senha) { setErro("Preencha e-mail e senha."); return; }
    setCarregando(true);
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password: senha });
      if (error) { setErro(traduzErroAuth(error)); setCarregando(false); return; }
      // Garante que existe uma linha de perfil pra essa decoradora (caso o cadastro
      // tenha sido feito antes da confirmação de e-mail).
      const { data: perfilExistente } = await sb.from("decoradoras").select("id").eq("id", data.user.id).maybeSingle();
      if (!perfilExistente) {
        await sb.from("decoradoras").insert({ id: data.user.id, nome_loja: nomeLoja.trim() || "Minha Loja" });
      }
      onAuthed();
    } catch (err) {
      setErro("Erro inesperado: " + err.message);
    }
    setCarregando(false);
  }

  function traduzErroAuth(error) {
    const msg = error.message || "";
    if (msg.includes("Invalid login credentials")) return "E-mail ou senha incorretos.";
    if (msg.includes("already registered")) return "Já existe uma conta com esse e-mail. Tente entrar em vez de cadastrar.";
    if (msg.includes("Password should be")) return "A senha precisa ter pelo menos 6 caracteres.";
    return msg;
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden" style={{ background: `linear-gradient(160deg, ${BRAND.azul} 0%, ${BRAND.azulEscuro} 100%)` }}>
      <div className="absolute -top-10 -left-10 w-40 h-40 rounded-full opacity-30" style={{ background: BRAND.rosa }} />
      <div className="absolute top-24 right-10 w-24 h-24 rounded-full opacity-30" style={{ background: BRAND.amarelo }} />
      <div className="relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
        <div className="flex flex-col items-center mb-6">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-3 rotate-3 text-3xl" style={{ background: `linear-gradient(135deg, ${BRAND.rosa}, ${BRAND.roxo})` }}>🎉</div>
          <h1 className="fredoka text-2xl font-bold text-center" style={{ color: BRAND.azul }}>Pegue &amp; Monte</h1>
          <p className="text-sm text-slate-400 text-center mt-1">Painel para decoradoras</p>
        </div>

        <div className="grid grid-cols-2 gap-2 mb-5 p-1 rounded-xl" style={{ background: BRAND.bg }}>
          <button onClick={() => { setModo("login"); setErro(""); setAviso(""); }} className="py-2 rounded-lg text-sm font-bold cursor-pointer" style={modo === "login" ? { background: "#fff", color: BRAND.azul } : { color: "#94a3b8" }}>Entrar</button>
          <button onClick={() => { setModo("cadastro"); setErro(""); setAviso(""); }} className="py-2 rounded-lg text-sm font-bold cursor-pointer" style={modo === "cadastro" ? { background: "#fff", color: BRAND.azul } : { color: "#94a3b8" }}>Criar conta</button>
        </div>

        {modo === "cadastro" && (
          <Field label="Nome da sua loja">
            <input className={inputClass} value={nomeLoja} onChange={(e) => setNomeLoja(e.target.value)} placeholder="Ex: PriFestasdecor" />
          </Field>
        )}
        <Field label="E-mail">
          <input className={inputClass} type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="seuemail@exemplo.com" />
        </Field>
        <Field label="Senha" hint={modo === "cadastro" ? "Mínimo de 6 caracteres." : undefined}>
          <input className={inputClass} type="password" value={senha} onChange={(e) => setSenha(e.target.value)} placeholder="••••••" />
        </Field>

        <ErrorBox>{erro}</ErrorBox>
        <SuccessBox>{aviso}</SuccessBox>

        <button
          type="button"
          disabled={carregando}
          onClick={modo === "cadastro" ? handleCadastro : handleLogin}
          className="w-full py-3 rounded-xl font-bold text-white transition-transform active:scale-95 cursor-pointer disabled:opacity-60"
          style={{ background: BRAND.rosa }}
        >
          {carregando ? "Só um instante..." : modo === "cadastro" ? "Criar conta e começar teste grátis de 7 dias" : "Entrar"}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   ASSINATURA DIGITAL (canvas)
============================================================ */
function SignaturePad({ value, onChange }) {
  const canvasRef = useRef(null);
  const drawingRef = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });
  const hasDrawnRef = useRef(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = BRAND.tinta;
    if (value) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = value;
      hasDrawnRef.current = true;
    }
  }, []);

  function getPos(e) {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
  }
  function start(e) { e.preventDefault(); drawingRef.current = true; lastPos.current = getPos(e); }
  function move(e) {
    if (!drawingRef.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos; hasDrawnRef.current = true;
  }
  function end() {
    if (!drawingRef.current) return;
    drawingRef.current = false;
    if (hasDrawnRef.current) onChange(canvasRef.current.toDataURL("image/png"));
  }
  function clear() {
    const canvas = canvasRef.current;
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    hasDrawnRef.current = false;
    onChange("");
  }

  return (
    <div>
      <canvas ref={canvasRef} width={480} height={160} className="w-full rounded-xl bg-white" style={{ border: "2px dashed #e2e8f0", cursor: "crosshair", touchAction: "none" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
      <button type="button" onClick={clear} className="text-xs font-semibold text-rose-400 hover:text-rose-500 mt-2 cursor-pointer">Limpar e assinar de novo</button>
    </div>
  );
}

const MAX_LOGO_BYTES = 1.5 * 1024 * 1024;

function PerfilTab({ profile, userId, onSaved, setPage }) {
  const [form, setForm] = useState(profile);
  const [erro, setErro] = useState("");
  const [salvo, setSalvo] = useState(false);
  const [salvando, setSalvando] = useState(false);

  function set(field, value) { setForm((f) => ({ ...f, [field]: value })); setSalvo(false); }

  function handleLogo(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setErro("");
    if (!file.type.startsWith("image/")) { setErro("Escolha um arquivo de imagem (PNG ou JPG)."); return; }
    if (file.size > MAX_LOGO_BYTES) { setErro("Essa imagem é grande demais. Escolha uma logo com até 1,5MB."); return; }
    const reader = new FileReader();
    reader.onload = () => set("logo_data_url", reader.result);
    reader.readAsDataURL(file);
  }

  async function handleSave() {
    try {
      setErro(""); setSalvando(true);
      if (!form.nome_loja.trim()) { setErro("Digite o nome da loja."); setSalvando(false); return; }
      const { error } = await sb.from("decoradoras").update({
        nome_loja: form.nome_loja.trim(), nome_responsavel: form.nome_responsavel, cnpj: form.cnpj, endereco: form.endereco,
        logo_data_url: form.logo_data_url, assinatura_data_url: form.assinatura_data_url,
        cor_principal: form.cor_principal, cor_destaque: form.cor_destaque, cor_alerta: form.cor_alerta, cor_sucesso: form.cor_sucesso,
      }).eq("id", userId);
      if (error) { setErro("Erro ao salvar: " + error.message); setSalvando(false); return; }
      applyTheme(form);
      onSaved(form);
      setSalvo(true);
    } catch (err) {
      setErro("Erro inesperado: " + err.message);
    }
    setSalvando(false);
  }

  return (
    <div className="max-w-2xl mx-auto px-5 py-7">
      <h2 className="fredoka text-xl font-bold mb-1" style={{ color: BRAND.tinta }}>Perfil da loja</h2>
      <p className="text-sm text-slate-400 mb-5">Esses dados aparecem no cabeçalho e no contrato.</p>
      <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
        <Field label="Logo da loja" hint="PNG ou JPG, até 1,5MB">
          <div className="flex items-center gap-4">
            <div className="w-20 h-20 rounded-2xl overflow-hidden flex items-center justify-center shrink-0" style={{ background: BRAND.bg, border: "2px dashed #e2e8f0" }}>
              {form.logo_data_url ? <img src={form.logo_data_url} alt="Logo" className="w-full h-full object-cover" /> : <span className="text-2xl">🖼️</span>}
            </div>
            <div className="flex flex-col gap-2">
              <label className="inline-flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-sm font-bold cursor-pointer w-fit" style={{ color: BRAND.azul, background: BRAND.azul + "12" }}>
                {form.logo_data_url ? "Trocar logo" : "Enviar logo"}
                <input type="file" accept="image/*" className="hidden" onChange={handleLogo} />
              </label>
              {form.logo_data_url && <button type="button" onClick={() => set("logo_data_url", "")} className="text-xs font-semibold text-rose-400 text-left cursor-pointer">Remover logo</button>}
            </div>
          </div>
        </Field>
        <Field label="Nome da loja"><input className={inputClass} value={form.nome_loja} onChange={(e) => set("nome_loja", e.target.value)} /></Field>
        <Field label="Seu nome (responsável)"><input className={inputClass} value={form.nome_responsavel || ""} onChange={(e) => set("nome_responsavel", e.target.value)} /></Field>
        <Field label="CNPJ"><input className={inputClass} value={form.cnpj || ""} onChange={(e) => set("cnpj", e.target.value)} placeholder="00.000.000/0000-00" /></Field>
        <Field label="Endereço"><input className={inputClass} value={form.endereco || ""} onChange={(e) => set("endereco", e.target.value)} /></Field>

        <div className="mt-2 mb-1 pt-4 border-t border-slate-100">
          <p className="font-bold text-sm mb-0.5" style={{ color: BRAND.rosa }}>Assinatura digital</p>
        </div>
        <div className="mb-4"><SignaturePad value={form.assinatura_data_url} onChange={(url) => set("assinatura_data_url", url)} /></div>

        <div className="mt-2 mb-1 pt-4 border-t border-slate-100">
          <p className="font-bold text-sm mb-0.5" style={{ color: BRAND.rosa }}>Cores do app</p>
        </div>
        {[
          { key: "cor_principal", label: "Cor principal", presets: ["#16308A", "#7C2D92", "#0F766E", "#B45309", "#1E293B", "#BE123C"] },
          { key: "cor_destaque", label: "Cor de destaque", presets: ["#EC1E79", "#F97316", "#DB2777", "#6366F1", "#059669", "#DC2626"] },
          { key: "cor_sucesso", label: "Cor de \"pago\"", presets: ["#22C3C3", "#22C55E", "#0EA5E9", "#14B8A6"] },
          { key: "cor_alerta", label: "Cor de \"pendente\"", presets: ["#FFC93C", "#F59E0B", "#EAB308", "#FB923C"] },
        ].map((campo) => (
          <Field key={campo.key} label={campo.label}>
            <div className="flex items-center gap-2 flex-wrap">
              <label className="relative w-10 h-10 rounded-xl overflow-hidden border-2 border-slate-200 cursor-pointer shrink-0" style={{ background: form[campo.key] }}>
                <input type="color" value={form[campo.key]} onChange={(e) => set(campo.key, e.target.value)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
              </label>
              {campo.presets.map((cor) => (
                <button type="button" key={cor} onClick={() => set(campo.key, cor)} className="w-7 h-7 rounded-full border-2 cursor-pointer" style={{ background: cor, borderColor: form[campo.key] === cor ? BRAND.tinta : "transparent" }} />
              ))}
            </div>
          </Field>
        ))}

        <ErrorBox>{erro}</ErrorBox>
        <SuccessBox>{salvo ? "Perfil salvo!" : ""}</SuccessBox>
        <div className="flex gap-3">
          <button type="button" disabled={salvando} onClick={handleSave} className="flex-1 py-3 rounded-xl font-bold text-white active:scale-95 transition cursor-pointer disabled:opacity-60" style={{ background: BRAND.rosa }}>
            {salvando ? "Salvando..." : "Salvar perfil"}
          </button>
          <button type="button" onClick={() => setPage("home")} className="px-5 py-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-50 cursor-pointer">Voltar</button>
        </div>
      </div>
    </div>
  );
}

    <div class="assinaturas"><div><div style="height:64px"></div><div class="linha"></div>${escapar(dados.contratanteNome)}<br/><span style="font-size:11px;color:#999">CPF: ${escapar(dados.contratanteCPF)}</span></div>
    <div><div style="height:64px;display:flex;align-items:flex-end;justify-content:center">${profile.assinatura_data_url ? `<img src="${profile.assinatura_data_url}"/>` : ""}</div><div class="linha"></div>${escapar(profile.nome_responsavel || profile.nome_loja)}<br/><span style="font-size:11px;color:#999">${escapar(profile.nome_loja)}</span></div></div>
    <div style="margin-top:20px;padding-top:14px;border-top:1px dashed #ddd">
      <span class="pill" style="background:${BRAND.azul}22;color:${BRAND.azul}">Total ${formatBRL(fin.valor)}</span>
      <span class="pill" style="background:${BRAND.turquesa}22;color:${BRAND.turquesa}">Pago ${formatBRL(fin.pago)}</span>
      <span class="pill" style="background:${BRAND.rosa}22;color:${BRAND.rosa}">Falta ${formatBRL(fin.pendente)}</span>
    </div>
  </div></body></html>`;
}

/* ============================================================
   ABA DE CONTRATO (ligada ao Supabase)
============================================================ */
function buildReminderMessage(nomeCliente, kit, tipoServico, data, hora, horaFim, profile) {
  const isDecoracao = tipoServico === "decoracao";
  if (isDecoracao) return `Oi, ${nomeCliente}! Aqui é da ${profile.nome_loja}. Passando pra lembrar que amanhã, ${formatDateLong(data)}, é a montagem da decoração, das ${hora} às ${horaFim}. Qualquer coisa, me chama! 🎈`;
  return `Oi, ${nomeCliente}! Aqui é da ${profile.nome_loja}. Passando pra lembrar que amanhã, ${formatDateLong(data)}, é a retirada do seu produto ${kit}, das ${hora} às ${horaFim}. Venha com um carro adequado pra levar tudo bem acomodado! 🎉`;
}

function ContratoTab({ userId, profile }) {
  const [contracts, setContracts] = useState([]);
  const [carregando, setCarregando] = useState(true);
  const [form, setForm] = useState(CAMPOS_VAZIOS);
  const [editingId, setEditingId] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [erro, setErro] = useState("");
  const [salvo, setSalvo] = useState(false);
  const [busca, setBusca] = useState("");
  const [mostrarSugestoes, setMostrarSugestoes] = useState(false);
  const [salvando, setSalvando] = useState(false);

  const carregarContratos = useCallback(async () => {
    setCarregando(true);
    const { data, error } = await sb.from("contracts").select("*").eq("decoradora_id", userId).order("created_at", { ascending: false });
    if (!error && data) setContracts(data.map(contractFromDb));
    setCarregando(false);
    if (!data || data.length === 0) setShowForm(true);
  }, [userId]);

  useEffect(() => { carregarContratos(); }, [carregarContratos]);

  function set(field, value) { setForm((f) => ({ ...f, [field]: value })); }

  const clientesAnteriores = useMemo(() => {
    const map = {};
    contracts.forEach((c) => {
      if (editingId && c.id === editingId) return;
      const key = normalizeStr(c.contratanteNome);
      if (!key) return;
      if (!map[key]) map[key] = { nome: c.contratanteNome, cpf: c.contratanteCPF, endereco: c.contratanteEndereco, whatsapp: c.contratanteWhatsapp, count: 0, lastCreatedAt: 0 };
      map[key].count += 1;
      if ((c.createdAt || 0) >= map[key].lastCreatedAt) {
        map[key].lastCreatedAt = c.createdAt || 0;
        map[key].cpf = c.contratanteCPF; map[key].endereco = c.contratanteEndereco; map[key].whatsapp = c.contratanteWhatsapp;
      }
    });
    return map;
  }, [contracts, editingId]);

  const sugestoesNome = useMemo(() => {
    const termo = normalizeStr(form.contratanteNome);
    if (!termo || termo.length < 2) return [];
    return Object.values(clientesAnteriores).filter((cl) => normalizeStr(cl.nome).includes(termo) && normalizeStr(cl.nome) !== termo).slice(0, 5);
  }, [form.contratanteNome, clientesAnteriores]);

  const clienteRepetido = clientesAnteriores[normalizeStr(form.contratanteNome)];

  useEffect(() => {
    if (editingId) return;
    const match = clientesAnteriores[normalizeStr(form.contratanteNome)];
    if (!match) return;
    setForm((f) => {
      if (f.contratanteCPF.trim() || f.contratanteEndereco.trim() || f.contratanteWhatsapp.trim()) return f;
      return { ...f, contratanteCPF: match.cpf || f.contratanteCPF, contratanteEndereco: match.endereco || f.contratanteEndereco, contratanteWhatsapp: match.whatsapp || f.contratanteWhatsapp };
    });
  }, [form.contratanteNome, clientesAnteriores, editingId]);

  function selecionarCliente(cl) {
    setForm((f) => ({ ...f, contratanteNome: cl.nome, contratanteCPF: cl.cpf || f.contratanteCPF, contratanteEndereco: cl.endereco || f.contratanteEndereco, contratanteWhatsapp: cl.whatsapp || f.contratanteWhatsapp }));
    setMostrarSugestoes(false);
  }

  function startNew() { setForm(CAMPOS_VAZIOS); setEditingId(null); setErro(""); setSalvo(false); setShowForm(true); }
  function editContract(c) { setForm({ ...CAMPOS_VAZIOS, ...c }); setEditingId(c.id); setErro(""); setSalvo(false); setShowForm(true); }

  async function handleSave() {
    setErro(""); setSalvo(false);
    const faltando = [];
    if (!form.contratanteNome.trim()) faltando.push("nome do contratante");
    if (!form.produtoNome.trim()) faltando.push("nome do produto");
    if (!String(form.valor).trim()) faltando.push("valor");
    if (!form.dataRetirada) faltando.push("data de retirada");
    if (faltando.length > 0) { setErro("Preencha antes: " + faltando.join(", ") + "."); return; }
    setSalvando(true);
    const id = editingId || uid();
    const row = contractToDb({ ...form, id }, userId);
    const { error } = await sb.from("contracts").upsert(row);
    setSalvando(false);
    if (error) { setErro("Erro ao salvar: " + error.message); return; }
    await carregarContratos();
    setSalvo(true); setShowForm(false);
  }

  async function removeContract(id) {
    const { error } = await sb.from("contracts").delete().eq("id", id);
    if (error) { setErro("Erro ao excluir: " + error.message); return; }
    await carregarContratos();
  }

  function handlePrint() {
    try {
      const html = buildContractHtml(form, profile);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    } catch (err) { setErro("Não consegui gerar o contrato: " + err.message); }
  }

  function handleSendWhatsapp(c) {
    if (!c.contratanteWhatsapp) { setErro("Esse contrato não tem WhatsApp cadastrado."); return; }
    const fin = computeFinance(c);
    const msg = [
      `Olá, ${c.contratanteNome}! Aqui é da ${profile.nome_loja}.`,
      `Segue o resumo do seu contrato:`, `Produto: ${c.produtoNome}`,
      `Valor: ${formatBRL(fin.valor)} (pago: ${formatBRL(fin.pago)} · falta: ${formatBRL(fin.pendente)})`,
      `${labelData(c.tipoServico, "ida")}: ${c.dataRetirada ? formatDateLong(c.dataRetirada) : "-"} das ${c.horaRetiradaIni} às ${c.horaRetiradaFim}`,
      `${labelData(c.tipoServico, "volta")}: ${c.dataDevolucao ? formatDateLong(c.dataDevolucao) : "-"} das ${c.horaDevolucaoIni} às ${c.horaDevolucaoFim}`,
      ``, `Vou te enviar o PDF do contrato em seguida. Qualquer dúvida, me chama! 🎉`,
    ].join("\n");
    window.open(whatsappLink(c.contratanteWhatsapp, msg), "_blank");
  }

  const ordered = [...contracts].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)).filter((c) => !busca.trim() || normalizeStr(c.contratanteNome).includes(normalizeStr(busca)));

  if (carregando) return <div className="max-w-5xl mx-auto px-5 py-16 text-center text-slate-400">Carregando contratos...</div>;

  return (
    <div className="max-w-5xl mx-auto px-5 py-7">
      <div className="flex items-center justify-between mb-5">
        <div><h2 className="fredoka text-xl font-bold" style={{ color: BRAND.tinta }}>Preencher contrato</h2>
        <p className="text-sm text-slate-400">O texto já vem pronto — você só troca os campos que mudam.</p></div>
        {!showForm && <button onClick={startNew} className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl font-bold text-white text-sm active:scale-95 transition cursor-pointer" style={{ background: BRAND.rosa }}>+ Novo</button>}
      </div>

      {showForm ? (
        <div className="grid lg:grid-cols-2 gap-6">
          <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 h-fit">
            <p className="font-bold text-sm mb-4" style={{ color: BRAND.rosa }}>Dados que mudam a cada contrato</p>
            <Field label="Tipo de serviço">
              <div className="grid grid-cols-2 gap-2">
                {[{ v: "pegue_monte", l: "Pegue e Monte" }, { v: "decoracao", l: "Decoração" }, { v: "baloes", l: "Balões" }, { v: "pecas_avulsas", l: "Peças avulsas" }].map((op) => (
                  <button type="button" key={op.v} onClick={() => set("tipoServico", op.v)} className="py-2 rounded-xl text-sm font-bold border-2 transition cursor-pointer" style={form.tipoServico === op.v ? { background: BRAND.azul, borderColor: BRAND.azul, color: "#fff" } : { borderColor: "#e2e8f0", color: BRAND.tinta }}>{op.l}</button>
                ))}
              </div>
            </Field>
            <Field label="Nome do contratante">
              <div className="relative">
                <input className={inputClass} value={form.contratanteNome} onChange={(e) => { set("contratanteNome", e.target.value); setMostrarSugestoes(true); }} onFocus={() => setMostrarSugestoes(true)} onBlur={() => setTimeout(() => setMostrarSugestoes(false), 150)} autoComplete="off" />
                {mostrarSugestoes && sugestoesNome.length > 0 && (
                  <div className="absolute z-10 left-0 right-0 mt-1 bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden">
                    {sugestoesNome.map((cl) => (
                      <button type="button" key={cl.nome} onMouseDown={(e) => { e.preventDefault(); selecionarCliente(cl); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-50 flex items-center justify-between gap-2 cursor-pointer">
                        <span className="text-sm font-medium truncate" style={{ color: BRAND.tinta }}>{cl.nome}</span>
                        <span className="text-[11px] font-bold shrink-0 px-2 py-0.5 rounded-full" style={{ background: BRAND.turquesa + "20", color: BRAND.turquesa }}>{cl.count} festa{cl.count > 1 ? "s" : ""}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
              {clienteRepetido && <p className="text-xs font-semibold mt-1.5" style={{ color: BRAND.turquesa }}>🎉 Esse cliente já fechou {clienteRepetido.count} festa{clienteRepetido.count > 1 ? "s" : ""} com a gente!</p>}
            </Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="CPF"><input className={inputClass} value={form.contratanteCPF} onChange={(e) => set("contratanteCPF", e.target.value)} /></Field>
              <Field label="Valor do produto"><input className={inputClass} value={form.valor} onChange={(e) => set("valor", e.target.value.replace(/[^0-9.,]/g, ""))} placeholder="90,00" /></Field>
            </div>
            <Field label="Endereço do contratante"><input className={inputClass} value={form.contratanteEndereco} onChange={(e) => set("contratanteEndereco", e.target.value)} /></Field>
            <Field label="WhatsApp do contratante" hint="Com DDD"><input className={inputClass} value={form.contratanteWhatsapp} onChange={(e) => set("contratanteWhatsapp", e.target.value)} placeholder="(61) 99999-8888" /></Field>
            <Field label="Nome do produto"><input className={inputClass} value={form.produtoNome} onChange={(e) => set("produtoNome", e.target.value)} /></Field>
            <Field label="Material entregue"><input className={inputClass} value={form.materialEntregue} onChange={(e) => set("materialEntregue", e.target.value)} /></Field>
            <div className="grid grid-cols-3 gap-3">
              <Field label={labelData(form.tipoServico, "ida")}><input type="date" className={inputClass} value={form.dataRetirada} onChange={(e) => set("dataRetirada", e.target.value)} /></Field>
              <Field label="Hora início"><input type="time" className={inputClass} value={form.horaRetiradaIni} onChange={(e) => set("horaRetiradaIni", e.target.value)} /></Field>
              <Field label="Hora fim"><input type="time" className={inputClass} value={form.horaRetiradaFim} onChange={(e) => set("horaRetiradaFim", e.target.value)} /></Field>
            </div>
            <div className="grid grid-cols-3 gap-3">
              <Field label={labelData(form.tipoServico, "volta")}><input type="date" className={inputClass} value={form.dataDevolucao} onChange={(e) => set("dataDevolucao", e.target.value)} /></Field>
              <Field label="Hora início"><input type="time" className={inputClass} value={form.horaDevolucaoIni} onChange={(e) => set("horaDevolucaoIni", e.target.value)} /></Field>
              <Field label="Hora fim"><input type="time" className={inputClass} value={form.horaDevolucaoFim} onChange={(e) => set("horaDevolucaoFim", e.target.value)} /></Field>
            </div>
            <Field label="Status do pagamento">
              <div className="grid grid-cols-3 gap-2">
                {[{ v: "pendente", l: "Pendente" }, { v: "sinal", l: "Sinal (50%)" }, { v: "pago", l: "Pago" }].map((op) => (
                  <button type="button" key={op.v} onClick={() => set("statusPagamento", op.v)} className="py-2 rounded-xl text-sm font-bold border-2 transition cursor-pointer" style={form.statusPagamento === op.v ? { background: BRAND.azul, borderColor: BRAND.azul, color: "#fff" } : { borderColor: "#e2e8f0", color: BRAND.tinta }}>{op.l}</button>
                ))}
              </div>
            </Field>
            <ErrorBox>{erro}</ErrorBox>
            <div className="flex gap-3 mt-3">
              <button type="button" disabled={salvando} onClick={handleSave} className="flex-1 py-3 rounded-xl font-bold text-white active:scale-95 transition cursor-pointer disabled:opacity-60" style={{ background: BRAND.rosa }}>{salvando ? "Salvando..." : editingId ? "Salvar alterações" : "Salvar contrato"}</button>
              {contracts.length > 0 && <button type="button" onClick={() => setShowForm(false)} className="px-5 py-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-50 cursor-pointer">Cancelar</button>}
            </div>
          </div>
          <div>
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <p className="font-bold text-sm" style={{ color: BRAND.azul }}>Pré-visualização</p>
              <div className="flex gap-2">
                <button onClick={handlePrint} className="flex items-center gap-1.5 text-sm font-bold px-3 py-1.5 rounded-lg cursor-pointer" style={{ color: BRAND.azul, background: BRAND.azul + "12" }}>👁 Ver / Baixar</button>
                <button onClick={() => handleSendWhatsapp(form)} className="flex items-center gap-1.5 text-sm font-bold px-3 py-1.5 rounded-lg cursor-pointer" style={{ color: "#22C35E", background: "#22C35E18" }}>📲 WhatsApp</button>
              </div>
            </div>
            <ContratoPreview dados={form} profile={profile} />
          </div>
        </div>
      ) : (
        <div className="space-y-3">
          <div className="relative">
            <input className={inputClass + " pl-10"} value={busca} onChange={(e) => setBusca(e.target.value)} placeholder="🔎 Pesquisar pelo nome do cliente..." />
          </div>
          <SuccessBox>{salvo ? "Contrato salvo! Já está na lista abaixo." : ""}</SuccessBox>
          {ordered.map((c) => {
            const fin = computeFinance(c);
            return (
              <div key={c.id} className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                <div className="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white shrink-0 text-xl" style={{ background: BRAND.rosa }}>📄</div>
                  <div className="flex-1 min-w-0"><p className="font-bold text-xl leading-tight truncate fredoka" style={{ color: BRAND.tinta }}>{c.contratanteNome}</p><p className="text-sm text-slate-400 truncate">{c.produtoNome} · {labelData(c.tipoServico, "ida").toLowerCase()} {formatDateBR(c.dataRetirada)}</p></div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <Pill color={c.statusPagamento === "pago" ? BRAND.turquesa : c.statusPagamento === "sinal" ? BRAND.amarelo : BRAND.rosa}>{c.statusPagamento === "pago" ? "Pago" : c.statusPagamento === "sinal" ? "Sinal pago" : "Pendente"}</Pill>
                    <span className="font-bold text-sm" style={{ color: BRAND.azul }}>{formatBRL(fin.valor)}</span>
                  </div>
                </div>
                <div className="flex items-center gap-2 mt-3 pt-3 border-t border-slate-50 flex-wrap">
                  <button onClick={() => handleSendWhatsapp(c)} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold cursor-pointer" style={{ color: "#22C35E", background: "#22C35E18" }}>📲 WhatsApp</button>
                  <button onClick={() => editContract(c)} className="px-3 py-2 rounded-lg text-xs font-bold hover:bg-slate-50 cursor-pointer" style={{ color: BRAND.azul }}>Abrir / editar</button>
                  <button onClick={() => removeContract(c.id)} className="p-2 rounded-lg hover:bg-rose-50 text-rose-400 ml-auto cursor-pointer">🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP PRINCIPAL
============================================================ */
function App() {
  const [session, setSession] = useState(undefined); // undefined = carregando, null = deslogado
  const [profile, setProfile] = useState(null);
  const [page, setPage] = useState("home");
  const [contractsCount, setContractsCount] = useState(0);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => listener.subscription.unsubscribe();
  }, []);

  const carregarPerfil = useCallback(async (userId) => {
    const { data } = await sb.from("decoradoras").select("*").eq("id", userId).maybeSingle();
    if (data) { setProfile(data); applyTheme(data); }
  }, []);

  useEffect(() => {
    if (session === null) { setProfile(null); return; }
    if (session && session.user) carregarPerfil(session.user.id);
  }, [session, carregarPerfil]);

  useEffect(() => {
    if (!session || !session.user) return;
    sb.from("contracts").select("id", { count: "exact", head: true }).eq("decoradora_id", session.user.id).then(({ count }) => setContractsCount(count || 0));
  }, [session, page]);

  async function handleLogout() { await sb.auth.signOut(); setPage("home"); }

  if (session === undefined) {
    return <div className="min-h-screen flex items-center justify-center" style={{ background: BRAND.azul }}><span className="text-white">Carregando...</span></div>;
  }
  if (!session) return <AuthScreen onAuthed={() => {}} />;
  if (!profile) {
    return <div className="min-h-screen flex items-center justify-center" style={{ background: BRAND.azul }}><span className="text-white">Preparando seu painel...</span></div>;
  }

  return (
    <TrialGate profile={profile} onLogout={handleLogout}>
      <div className="min-h-screen" style={{ background: BRAND.bg }}>
        <Header userEmail={session.user.email} page={page} setPage={setPage} onLogout={handleLogout} profile={profile} />
        {page === "home" ? (
          <HomeDashboard setPage={setPage} contracts={Array(contractsCount).fill({})} />
        ) : page === "contrato" ? (
          <ContratoTab userId={session.user.id} profile={profile} />
        ) : page === "perfil" ? (
          <PerfilTab profile={profile} userId={session.user.id} onSaved={setProfile} setPage={setPage} />
        ) : (
          <div className="max-w-5xl mx-auto px-5 py-16 text-center text-slate-400">Em breve nesta versão web.</div>
        )}
        <div className="h-10" />
      </div>
    </TrialGate>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
