const ENTREGA_COLOR = BRAND.rosa;
const DEVOLUCAO_COLOR = BRAND.turquesa;
function eventoCores(e) {
  if (e.tipo === "volta") return { fill: DEVOLUCAO_COLOR, border: "transparent" };
  return { fill: ENTREGA_COLOR, border: "transparent" };
}
function tomorrowISO() { const d = new Date(); d.setDate(d.getDate()+1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
const MESES_LONGO = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const DIAS_SEMANA = ["D","S","T","Q","Q","S","S"];

function buildEvents(contracts) {
  const events = [];
  contracts.forEach((c) => {
    if (c.dataRetirada) events.push({ id: c.id+"-r", contractId: c.id, date: c.dataRetirada, tipo: "ida", label: labelData(c.tipoServico,"ida"), nome: c.contratanteNome, kit: c.produtoNome, hora: c.horaRetiradaIni, horaFim: c.horaRetiradaFim, whatsapp: c.contratanteWhatsapp, tipoServico: c.tipoServico });
    if (c.dataDevolucao) events.push({ id: c.id+"-d", contractId: c.id, date: c.dataDevolucao, tipo: "volta", label: labelData(c.tipoServico,"volta"), nome: c.contratanteNome, kit: c.produtoNome, hora: c.horaDevolucaoIni, horaFim: c.horaDevolucaoFim, whatsapp: c.contratanteWhatsapp, tipoServico: c.tipoServico });
  });
  return events;
}

function buildReminderMessage(e, profile) {
  const data = formatDateLong(e.date);
  const loja = profile.nome_loja;

  if (e.tipo !== "ida") {
    return `Oi, ${e.nome}! Aqui é da ${loja}. 🔔\n\n*Lembrete: amanhã, ${data}, é a ${e.label.toLowerCase()} do(a) ${e.kit}*, das ${e.hora} às ${e.horaFim}.\n\nQualquer dúvida, me chama! 🎉`;
  }

  if (e.tipoServico === "decoracao") {
    return `Oi, ${e.nome}! Aqui é da ${loja}. 🔔\n\n*Lembrete: amanhã, ${data}, é a montagem da decoração do seu evento*, das ${e.hora} às ${e.horaFim}.\n\n✅ Vamos combinar os últimos detalhes!\n📍 Deixe o local de montagem liberado e limpinho antes do horário combinado.\n⏰ Fique de olho no horário combinado — a pontualidade ajuda tudo a fluir melhor.\n\nQualquer dúvida, me chama! 🎈`;
  }

  if (e.tipoServico === "baloes") {
    return `Oi, ${e.nome}! Aqui é da ${loja}. 🔔\n\n*Lembrete: amanhã, ${data}, é a retirada do seu pedido de balões*, das ${e.hora} às ${e.horaFim}.\n\nCuidados importantes pra durar mais:\n☀️ Evite deixar os balões no sol ou em local fechado e quente (tipo carro no sol).\n🚗 Transporte com cuidado, sem apertar ou empilhar peso em cima.\n📅 Balões de qualidade duram de 3 a 5 dias em condições ideais.\n\nQualquer dúvida, me chama! 🎈`;
  }

  // pegue_monte e peças avulsas usam a mesma mensagem
  return `Oi, ${e.nome}! Aqui é da ${loja}. 🔔\n\n*Lembrete: amanhã, ${data}, é a retirada do seu ${e.tipoServico === "pecas_avulsas" ? "pedido" : "kit"} ${e.kit}*, das ${e.hora} às ${e.horaFim}.\n\nCuidados importantes:\n🚗 Só precisa trazer o porta-malas (ou banco de trás) liberado — nossos kits cabem em qualquer carro de passeio, não precisa de carro grande.\n🧼 Na devolução, entregue tudo limpo e no mesmo estado que retirou.\n⏰ A devolução tem horário marcado — atrasos geram multa.\n\nQualquer dúvida, me chama! 🎉`;
}

function MiniCalendar({ viewDate, setViewDate, eventsByDate, selected, setSelected }) {
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0;i<firstDay;i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  const todayStr = todayISO();
  function isoFor(day) { return `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`; }

  return (
    <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
      <div className="flex items-center justify-between mb-4">
        <button onClick={() => setViewDate(new Date(year, month-1, 1))} className="p-1.5 rounded-lg hover:bg-slate-50 cursor-pointer">◀</button>
        <p className="fredoka font-bold" style={{ color: BRAND.tinta }}>{MESES_LONGO[month]} {year}</p>
        <button onClick={() => setViewDate(new Date(year, month+1, 1))} className="p-1.5 rounded-lg hover:bg-slate-50 cursor-pointer">▶</button>
      </div>
      <div className="grid grid-cols-7 gap-1 mb-1">{DIAS_SEMANA.map((d,i) => <div key={i} className="text-center text-[11px] font-bold text-slate-300 py-1">{d}</div>)}</div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((day, i) => {
          if (!day) return <div key={i} />;
          const iso = isoFor(day);
          const evs = eventsByDate[iso] || [];
          const isToday = iso === todayStr;
          const isSelected = iso === selected;
          return (
            <button key={i} onClick={() => setSelected(iso)} className="aspect-square rounded-xl flex flex-col items-center justify-center text-sm font-semibold relative transition cursor-pointer"
              style={isSelected ? { background: BRAND.azul, color: "#fff" } : isToday ? { background: BRAND.azul+"14", color: BRAND.azul } : { color: BRAND.tinta }}>
              {day}
              {evs.length > 0 && (
                evs.length <= 3 ? (
                  <span className="flex gap-0.5 absolute bottom-1">
                    {evs.map((e,idx) => <span key={idx} className="w-2 h-2 rounded-full" style={isSelected ? { background: "#fff" } : { background: eventoCores(e).fill, border: `1.5px solid ${eventoCores(e).border}` }} />)}
                  </span>
                ) : (
                  <span className="absolute bottom-0.5 text-[9px] font-bold rounded-full px-1.5 leading-tight min-w-[16px] text-center" style={isSelected ? { background: "#fff", color: BRAND.azul } : { background: BRAND.rosa, color: "#fff" }}>{evs.length}</span>
                )
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function AgendaTab({ userId, profile }) {
  const [contracts, setContracts] = useState([]);
  const [carregando, setCarregando] = useState(true);
  const [viewDate, setViewDate] = useState(new Date());
  const [selected, setSelected] = useState(todayISO());
  const [erroLembrete, setErroLembrete] = useState("");
  const [obsAberta, setObsAberta] = useState(null); // id do evento com a observação aberta
  const [obsTexto, setObsTexto] = useState("");
  const [salvandoObs, setSalvandoObs] = useState(false);
  const [fotosPorContrato, setFotosPorContrato] = useState({});

  useEffect(() => {
    (async () => {
      const { data } = await sb.from("contracts").select("*").eq("decoradora_id", userId).order("created_at", { ascending: false });
      setContracts((data || []).map(contractFromDb));
      setCarregando(false);
    })();
  }, [userId]);

  useEffect(() => {
    (async () => {
      const { data } = await sb.from("contract_estoque_itens")
        .select("contract_id, estoque_itens(material, modelo, foto_data_url)")
        .eq("decoradora_id", userId);
      const mapa = {};
      (data || []).forEach((r) => {
        if (!r.estoque_itens || !r.estoque_itens.foto_data_url) return;
        (mapa[r.contract_id] = mapa[r.contract_id] || []).push(r.estoque_itens);
      });
      setFotosPorContrato(mapa);
    })();
  }, [userId]);

  function abrirObservacao(evento) {
    if (obsAberta === evento.id) { setObsAberta(null); return; }
    const contrato = contracts.find((c) => c.id === evento.contractId);
    setObsTexto((contrato && contrato.observacoes) || "");
    setObsAberta(evento.id);
  }

  async function salvarObservacao(evento) {
    setSalvandoObs(true);
    const { error } = await sb.from("contracts").update({ observacoes: obsTexto }).eq("id", evento.contractId);
    setSalvandoObs(false);
    if (!error) {
      setContracts((cs) => cs.map((c) => c.id === evento.contractId ? { ...c, observacoes: obsTexto } : c));
      setObsAberta(null);
    }
  }

  const [marcandoDevolucao, setMarcandoDevolucao] = useState(null);
  async function marcarDevolucao(evento) {
    setMarcandoDevolucao(evento.id);
    const { data: links } = await sb.from("contract_estoque_itens").select("*").eq("contract_id", evento.contractId);
    for (const link of links || []) {
      const { data: item } = await sb.from("estoque_itens").select("quantidade").eq("id", link.estoque_item_id).maybeSingle();
      if (item) await sb.from("estoque_itens").update({ quantidade: item.quantidade + link.quantidade }).eq("id", link.estoque_item_id);
    }
    await sb.from("contracts").update({ devolvido: true }).eq("id", evento.contractId);
    setContracts((cs) => cs.map((c) => c.id === evento.contractId ? { ...c, devolvido: true } : c));
    setMarcandoDevolucao(null);
  }

  const events = useMemo(() => buildEvents(contracts), [contracts]);
  const eventsByDate = useMemo(() => { const map = {}; events.forEach((e) => { (map[e.date]=map[e.date]||[]).push(e); }); return map; }, [events]);
  const doDia = (eventsByDate[selected] || []).sort((a,b) => (a.hora||"").localeCompare(b.hora||""));
  const eventosHoje = eventsByDate[todayISO()] || [];
  const entregasHoje = eventosHoje.filter((e) => e.tipo === "ida").length;
  const devolucoesHoje = eventosHoje.filter((e) => {
    if (e.tipo !== "volta") return false;
    const c = contracts.find((x) => x.id === e.contractId);
    return !(c && c.devolvido);
  }).length;

  const proximosAgrupados = useMemo(() => {
    const hoje = todayISO();
    const relevantes = events.filter((e) => e.date >= hoje).sort((a,b) => a.date.localeCompare(b.date) || (a.hora||"").localeCompare(b.hora||""));
    const grupos = {};
    relevantes.forEach((e) => { (grupos[e.date]=grupos[e.date]||[]).push(e); });
    return Object.entries(grupos).slice(0,8);
  }, [events]);

  const lembretesAmanha = useMemo(() => { const amanha = tomorrowISO(); return events.filter((e) => e.tipo === "ida" && e.date === amanha); }, [events]);

  function handleSendReminder(e) {
    setErroLembrete("");
    if (!e.whatsapp) { setErroLembrete(`${e.nome} não tem WhatsApp cadastrado nesse contrato.`); return; }
    window.open(whatsappLink(e.whatsapp, buildReminderMessage(e, profile)), "_blank");
  }

  if (carregando) return <Carregando texto="Carregando agenda..." />;
  if (contracts.length === 0) return <div className="max-w-5xl mx-auto px-5 py-16 text-center text-slate-400">📅<p className="mt-3">Preencha um contrato e as datas aparecem aqui.</p></div>;

  return (
    <div className="max-w-5xl mx-auto px-4 sm:px-5 py-6 sm:py-7">
      <h2 className="fredoka text-xl font-bold mb-1" style={{ color: BRAND.tinta }}>Agenda</h2>
      <p className="text-sm text-slate-400 mb-3">O calendário marca as datas de entrega e devolução dos kits.</p>

      {(entregasHoje > 0 || devolucoesHoje > 0) && (
        <div className="flex flex-wrap gap-3 mb-4">
          {entregasHoje > 0 && (
            <div className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold" style={{ background: ENTREGA_COLOR+"15", color: ENTREGA_COLOR }}>
              📦 Você tem {entregasHoje} kit{entregasHoje > 1 ? "s" : ""} pra entregar hoje
            </div>
          )}
          {devolucoesHoje > 0 && (
            <div className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold" style={{ background: DEVOLUCAO_COLOR+"15", color: "#0E8E8E" }}>
              ✅ Você tem {devolucoesHoje} kit{devolucoesHoje > 1 ? "s" : ""} pra receber hoje
            </div>
          )}
        </div>
      )}

      <div className="flex flex-wrap gap-4 mb-5">
        <span className="text-xs font-semibold flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background: ENTREGA_COLOR }} />Entrega de kit</span>
        <span className="text-xs font-semibold flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background: DEVOLUCAO_COLOR }} />Devolução de kit</span>
      </div>

      {erroLembrete && <div className="text-sm font-semibold mb-4 px-3 py-2.5 rounded-xl" style={{ background: BRAND.rosa+"15", color: BRAND.rosa }}>⚠️ {erroLembrete}</div>}

      {lembretesAmanha.length > 0 && (
        <div className="rounded-2xl p-5 mb-5" style={{ background: BRAND.amarelo+"18", border: `2px solid ${BRAND.amarelo}55` }}>
          <p className="font-bold text-sm mb-3" style={{ color: "#8a6400" }}>🎁 Lembretes para amanhã ({lembretesAmanha.length})</p>
          <div className="space-y-2">
            {lembretesAmanha.map((e) => (
              <div key={e.id} className="flex items-center gap-3 bg-white rounded-xl p-3">
                <div className="min-w-0 flex-1"><p className="font-semibold text-sm truncate" style={{ color: BRAND.tinta }}>{e.nome} · {e.kit}</p><p className="text-xs text-slate-400 truncate">{e.label} às {e.hora}</p></div>
                <button onClick={() => handleSendReminder(e)} className="flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-lg shrink-0 cursor-pointer" style={{ color: "#22C35E", background: "#22C35E18" }}>📲 Enviar</button>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="grid lg:grid-cols-2 gap-5">
        <MiniCalendar viewDate={viewDate} setViewDate={setViewDate} eventsByDate={eventsByDate} selected={selected} setSelected={setSelected} />
        <div className="space-y-5">
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <p className="font-bold text-sm mb-1" style={{ color: BRAND.tinta }}>{selected === todayISO() ? "Hoje" : formatDateLong(selected)}</p>
            {doDia.length === 0 ? <p className="text-sm text-slate-400 mt-2">Nada marcado neste dia.</p> : (
              <div className="mt-3 space-y-2">
                {doDia.map((e) => {
                  const contratoDoEvento = contracts.find((c) => c.id === e.contractId);
                  const temObs = contratoDoEvento && contratoDoEvento.observacoes;
                  return (
                    <div key={e.id}>
                      <p className="font-bold text-sm mb-1 break-words" style={{ color: BRAND.tinta }}>{e.nome}</p>
                      <div className="rounded-xl overflow-hidden" style={{ background: eventoCores(e).fill+"10", borderLeft: `3px solid ${eventoCores(e).fill}` }}>
                      <div className="flex items-center gap-3 p-3">
                        <div className="w-9 h-9 rounded-lg flex items-center justify-center text-white shrink-0" style={{ background: eventoCores(e).fill }}>{e.tipo === "ida" ? "📦" : "✅"}</div>
                        <div className="min-w-0 flex-1">
                          <p className="font-semibold text-sm truncate" style={{ color: BRAND.tinta }}>{e.kit}</p>
                          <p className="text-xs text-slate-400 truncate">{e.label} às {e.hora}</p>
                        </div>
                        <button onClick={() => abrirObservacao(e)} className="p-2 rounded-lg shrink-0 cursor-pointer relative" style={{ color: BRAND.azul, background: BRAND.azul+"14" }} title="Observação">
                          📝{temObs && <span className="absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full" style={{ background: "#F97316" }} />}
                        </button>
                        {e.tipo === "volta" && (
                          contratoDoEvento && contratoDoEvento.devolvido ? (
                            <span className="text-xs font-bold px-2.5 py-2 rounded-lg shrink-0" style={{ color: "#22C55E", background: "#22C55E18" }}>✅ Devolvido</span>
                          ) : (
                            <button disabled={marcandoDevolucao === e.id} onClick={() => marcarDevolucao(e)} className="text-xs font-bold px-2.5 py-2 rounded-lg shrink-0 cursor-pointer disabled:opacity-60" style={{ color: "#22C55E", background: "#22C55E18" }} title="Marcar devolução e devolver pro estoque">
                              {marcandoDevolucao === e.id ? "..." : "✅ Marcar devolução"}
                            </button>
                          )
                        )}
                        <button onClick={() => handleSendReminder(e)} className="p-2 rounded-lg shrink-0 cursor-pointer" style={{ color: "#22C35E", background: "#22C35E18" }}>📲</button>
                      </div>
                      {e.tipo === "ida" && contratoDoEvento && (contratoDoEvento.materialEntregue || contratoDoEvento.materialObservacoes || (fotosPorContrato[e.contractId] || []).length > 0) && (
                        <div className="px-3 pb-3">
                          {contratoDoEvento.materialEntregue && <p className="text-xs text-slate-500 mb-1"><b>Levar:</b> {contratoDoEvento.materialEntregue}</p>}
                          {contratoDoEvento.materialObservacoes && (
                            <div className="rounded-lg px-2.5 py-2 mb-2 text-xs font-semibold" style={{ background: "#F97316" + "15", color: "#B45309" }}>📝 {contratoDoEvento.materialObservacoes}</div>
                          )}
                          {(fotosPorContrato[e.contractId] || []).length > 0 && (
                            <div className="flex gap-1.5 flex-wrap">
                              {fotosPorContrato[e.contractId].map((f, i) => (
                                <img key={i} src={f.foto_data_url} loading="lazy" title={f.modelo ? `${f.material} — ${f.modelo}` : f.material} className="w-12 h-12 rounded-lg object-cover" style={{ border: "1px solid #e2e8f0" }} />
                              ))}
                            </div>
                          )}
                        </div>
                      )}
                      {obsAberta === e.id && (
                        <div className="px-3 pb-3">
                          <textarea
                            className="w-full rounded-xl border-2 border-slate-200 px-3 py-2 text-sm bg-white"
                            rows={3}
                            placeholder="Ex: cliente pediu pra chegar 30 min antes, confirmar endereço, etc."
                            value={obsTexto}
                            onChange={(ev) => setObsTexto(ev.target.value)}
                          />
                          <div className="flex gap-2 mt-2">
                            <button disabled={salvandoObs} onClick={() => salvarObservacao(e)} className="flex-1 py-2 rounded-lg text-xs font-bold text-white cursor-pointer disabled:opacity-60" style={{ background: BRAND.azul }}>
                              {salvandoObs ? "Salvando..." : "Salvar observação"}
                            </button>
                            <button onClick={() => setObsAberta(null)} className="px-3 py-2 rounded-lg text-xs font-bold text-slate-400 cursor-pointer">Cancelar</button>
                          </div>
                        </div>
                      )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <p className="font-bold text-sm mb-3" style={{ color: BRAND.tinta }}>Próximos compromissos</p>
            <div className="space-y-3">
              {proximosAgrupados.map(([data, evsDoDia]) => (
                <div key={data}>
                  <p className="text-xs font-bold mb-1.5" style={{ color: BRAND.azul }}>
                    {data === todayISO() ? "Hoje" : data === tomorrowISO() ? "Amanhã" : formatDateBR(data)}
                    {evsDoDia.length > 1 && <span className="text-slate-400 font-normal"> · {evsDoDia.length} compromissos</span>}
                  </p>
                  <div className="space-y-1">
                    {evsDoDia.map((e) => (
                      <button key={e.id} onClick={() => { setSelected(e.date); setViewDate(parseDateLocal(e.date)); }} className="w-full flex items-center gap-2 py-1.5 text-left hover:bg-slate-50 rounded-lg px-1.5 cursor-pointer">
                        <span className="text-[10px] font-bold shrink-0 px-2 py-1 rounded-full text-white" style={{ background: eventoCores(e).fill, border: `1.5px solid ${eventoCores(e).border}` }}>{TIPO_SERVICO_LABELS[e.tipoServico] || "Serviço"}</span>
                        <span className="text-sm truncate flex-1" style={{ color: BRAND.tinta }}>{e.nome} · {e.kit}</span>
                        <span className="text-[11px] text-slate-400 shrink-0">{e.label} {e.hora}</span>
                      </button>
                    ))}
                  </div>
                </div>
              ))}
              {proximosAgrupados.length === 0 && <p className="text-sm text-slate-400">Nenhum compromisso futuro.</p>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(undefined); // undefined = carregando, null = deslogado
  const [profile, setProfile] = useState(null);
  const [page, setPage] = useState("home");
  const [homeContracts, setHomeContracts] = useState([]);
  const [notificacoes, setNotificacoes] = useState([]);
  const [modoRecuperacao, setModoRecuperacao] = useState(false);
  const [menuAberto, setMenuAberto] = useState(false);
  const [appConfig, setAppConfig] = useState(null);

  useEffect(() => {
    if (!session || !session.user) return;
    sb.from("app_config").select("*").eq("id", 1).maybeSingle().then(({ data }) => setAppConfig(data));
  }, [session]);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = sb.auth.onAuthStateChange((event, s) => {
      setSession(s);
      if (event === "PASSWORD_RECOVERY") setModoRecuperacao(true);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const carregarPerfil = useCallback(async (userId, emailUsuario, tentativa = 0) => {
    const { data } = await sb.from("decoradoras").select("*").eq("id", userId).maybeSingle();
    if (data) { setProfile(data); applyTheme(data); return; }
    if (tentativa < 8) {
      // O perfil pode ainda estar sendo criado (corrida com o cadastro, comum em conexões lentas) — tenta de novo em instantes.
      setTimeout(() => carregarPerfil(userId, emailUsuario, tentativa + 1), 800);
      return;
    }
    // Rede de segurança: depois de várias tentativas, cria o perfil na hora, pra ninguém ficar travado.
    const { data: novo, error } = await sb.from("decoradoras").insert({ id: userId, nome_loja: "Minha Loja", email: emailUsuario || "" }).select().maybeSingle();
    if (novo) { setProfile(novo); applyTheme(novo); return; }
    if (error) {
      // Se dois lugares tentaram criar ao mesmo tempo, busca de novo — já deve existir agora.
      const { data: data2 } = await sb.from("decoradoras").select("*").eq("id", userId).maybeSingle();
      if (data2) { setProfile(data2); applyTheme(data2); }
    }
  }, []);

  useEffect(() => {
    if (session === null) { setProfile(null); return; }
    if (session && session.user) carregarPerfil(session.user.id, session.user.email);
  }, [session, carregarPerfil]);

  useEffect(() => {
    if (!session || !session.user) return;
    sb.from("contracts").select("*").eq("decoradora_id", session.user.id).then(({ data }) => setHomeContracts((data || []).map(contractFromDb)));
  }, [session, page]);

  useEffect(() => {
    if (!session || !session.user) return;
    (async () => {
      const [aniversarios, valeLembrar] = await Promise.all([
        buscarOportunidadesAniversarios(session.user.id),
        buscarValeAPenaLembrar(session.user.id),
      ]);
      const lista = [];
      aniversarios.filter((a) => a.diasAte <= 3).forEach((a) => {
        lista.push({ icone: "🎂", texto: `${a.nome} (${a.parentesco.toLowerCase()} de ${a.cliente}) ${a.diasAte === 0 ? "faz aniversário hoje!" : `faz aniversário em ${a.diasAte} dia${a.diasAte > 1 ? "s" : ""}.`}` });
      });
      valeLembrar.forEach((v) => {
        lista.push({ icone: "⭐", texto: `${v.cliente} alugou "${v.tema}" nesta época há ${v.anosAtras} ano${v.anosAtras > 1 ? "s" : ""}.` });
      });
      setNotificacoes(lista);
    })();
  }, [session, page]);

  async function handleLogout() { await sb.auth.signOut(); setPage("home"); }

  if (modoRecuperacao) {
    return <ResetPasswordScreen onDone={() => setModoRecuperacao(false)} />;
  }
  if (session === undefined) {
    return <div className="min-h-screen flex items-center justify-center" style={{ background: BRAND.azul }}><span className="text-white">Carregando...</span></div>;
  }
  if (!session) return <AuthScreen onAuthed={() => {}} />;
  if (!profile) {
    return <PreparandoPainel />;
  }

  return (
    <TrialGate profile={profile} onLogout={handleLogout}>
      <div className="min-h-screen" style={{ background: BRAND.bg }}>
        <Header userEmail={session.user.email} page={page} setPage={setPage} onLogout={handleLogout} profile={profile} notificacoes={notificacoes} userId={session.user.id} onOpenMenu={() => setMenuAberto(true)} />
        <SidebarMenu aberto={menuAberto} onClose={() => setMenuAberto(false)} config={appConfig} userEmail={session.user.email} profile={profile} onLogout={handleLogout} />
        {profile && !profile.onboarding_visto && (
          <WelcomeModal
            profile={profile}
            onClose={async () => {
              setProfile((p) => ({ ...p, onboarding_visto: true }));
              await sb.from("decoradoras").update({ onboarding_visto: true }).eq("id", session.user.id);
            }}
          />
        )}
        {page === "home" ? (
          <HomeDashboard setPage={setPage} contracts={homeContracts} profile={profile} userId={session.user.id} />
        ) : page === "contrato" ? (
          <ContratoTab userId={session.user.id} profile={profile} onProfileUpdate={setProfile} />
        ) : page === "financeiro" ? (
          <FinanceiroTab userId={session.user.id} profile={profile} />
        ) : page === "agenda" ? (
          <AgendaTab userId={session.user.id} profile={profile} />
        ) : page === "oportunidades" ? (
          <OportunidadesTab userId={session.user.id} profile={profile} />
        ) : page === "estoque" ? (
          <EstoqueTab userId={session.user.id} />
        ) : page === "perfil" ? (
          <PerfilTab profile={profile} userId={session.user.id} onSaved={setProfile} setPage={setPage} />
        ) : (
          <div className="max-w-5xl mx-auto px-5 py-16 text-center text-slate-400">Em breve nesta versão web.</div>
        )}
        <div className="h-10" />
      </div>
    </TrialGate>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
