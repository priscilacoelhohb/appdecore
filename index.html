<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap');
  html, body { font-family: 'Poppins', sans-serif; margin: 0; max-width: 100%; overflow-x: hidden; }
  * { min-width: 0; }
  .fredoka { font-family: 'Fredoka', sans-serif; }

  /* Toque mais responsivo em mobile (remove atraso de 300ms) */
  button, a, [role="button"], input, select, textarea { touch-action: manipulation; }

  /* Impede zoom automático do iOS ao focar campos (fonte < 16px dispara isso) */
  input, select, textarea { font-size: 16px; }

  /* Quebra palavras muito longas (links, e-mails) pra não estourar a largura */
  p, span, h1, h2, h3, a, div { overflow-wrap: break-word; }

  /* Respeita quem prefere menos animação */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>

function hexShade(hex, percent) {
  try {
    const h = hex.replace("#", "");
    const num = parseInt(h.length === 3 ? h.split("").map((c) => c + c).join("") : h, 16);
    let r = (num >> 16) & 0xff, g = (num >> 8) & 0xff, b = num & 0xff;
    const amt = Math.round(2.55 * percent);
    r = Math.min(255, Math.max(0, r + amt)); g = Math.min(255, Math.max(0, g + amt)); b = Math.min(255, Math.max(0, b + amt));
    return "#" + [r, g, b].map((v) => v.toString(16).padStart(2, "0")).join("");
  } catch (e) { return hex; }
}

function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function normalizeStr(s) { return (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }
function parseValorBR(v) {
  if (typeof v === "number") return v;
  if (!v) return 0;
  let s = String(v).trim();
  if (s.includes(",")) s = s.replace(/\./g, "").replace(",", ".");
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function formatBRL(v) { return parseValorBR(v).toLocaleString("pt-BR", { style: "currency", currency: "BRL" }); }
function parseDateLocal(str) { if (!str) return null; const [y, m, d] = str.split("-").map(Number); return new Date(y, m - 1, d); }
function formatDateBR(str) { const d = parseDateLocal(str); return d ? d.toLocaleDateString("pt-BR") : ""; }
const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
function formatDateLong(str) { const d = parseDateLocal(str); if (!d) return ""; return `${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`; }
function todayISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function computeFinance(c, percentualSinal) {
  const valor = parseValorBR(c.valor);
  const pct = (percentualSinal === undefined || percentualSinal === null) ? 50 : Number(percentualSinal);
  let pago = 0;
  if (c.statusPagamento === "pago") pago = valor;
  else if (c.statusPagamento === "sinal") pago = valor * (pct / 100);
  return { valor, pago, pendente: Math.max(valor - pago, 0) };
}
// Igual ao computeFinance, mas pra relatórios financeiros: se já foi pago o sinal e o dia
// da festa já passou, assume que o restante foi recebido na entrega (prática comum do negócio).
// Contratos "Pendente" (nada pago ainda) não entram nessa regra — ficam como estão até você confirmar.
function computeFinanceFaturamento(c, percentualSinal) {
  const base = computeFinance(c, percentualSinal);
  if (c.statusPagamento === "sinal" && c.dataRetirada && c.dataRetirada <= todayISO()) {
    return { valor: base.valor, pago: base.valor, pendente: 0 };
  }
  return base;
}
// Cada contrato pode ter o próprio percentual de sinal; se não tiver, usa o padrão da loja.
function pctSinalEfetivo(c, profile) {
  return (c.sinalPercentualContrato !== undefined && c.sinalPercentualContrato !== null && c.sinalPercentualContrato !== "")
    ? Number(c.sinalPercentualContrato)
    : Number(profile.sinal_percentual) || 50;
}

function preencherModeloContrato(template, dados, profile) {
  const mapa = {

    "{{DATA_DEVOLUCAO}}": dados.dataDevolucao ? formatDateLong(dados.dataDevolucao) : "___",

function ErrorBox({ children }) {
  if (!children) return null;
  return (
    <div className="text-sm font-semibold mb-4 px-3 py-2.5 rounded-xl flex items-start gap-2" style={{ background: BRAND.rosa + "15", color: BRAND.rosa }}>
      <span>⚠️</span><span>{children}</span>
    </div>
  );
}
function SuccessBox({ children }) {
  if (!children) return null;
  return (
    <div className="text-sm font-semibold mb-4 px-3 py-2.5 rounded-xl flex items-center gap-2" style={{ background: BRAND.turquesa + "18", color: "#0E8E8E" }}>
      <span>✅</span><span>{children}</span>
    </div>
  );
}

/* ============================================================
   TELA DE LOGIN / CADASTRO (autenticação real via Supabase Auth)
============================================================ */
function AuthScreen({ onAuthed }) {
  const [modo, setModo] = useState("login"); // login | cadastro
  const [nomeLoja, setNomeLoja] = useState("");
  const [email, setEmail] = useState("");
  const [senha, setSenha] = useState("");
  const [carregando, setCarregando] = useState(false);
  const [erro, setErro] = useState("");
  const [aviso, setAviso] = useState("");

  async function handleCadastro() {
    setErro(""); setAviso("");
    if (!nomeLoja.trim()) { setErro("Digite o nome da sua loja."); return; }
    if (!email.trim()) { setErro("Digite seu e-mail."); return; }
    if (senha.length < 6) { setErro("A senha precisa ter pelo menos 6 caracteres."); return; }
    setCarregando(true);
    try {
      const { data, error } = await sb.auth.signUp({ email: email.trim(), password: senha });
      if (error) { setErro(traduzErroAuth(error)); setCarregando(false); return; }
      if (data.session) {
        // Confirmação de e-mail desligada: já entra direto e cria o perfil da loja.
        await sb.from("decoradoras").insert({ id: data.user.id, nome_loja: nomeLoja.trim(), email: email.trim() });
        onAuthed();
      } else {
        setAviso("Conta criada! Verifique seu e-mail para confirmar o cadastro e depois faça login.");
        setModo("login");
      }
    } catch (err) {
      setErro("Erro inesperado: " + err.message);
    }
    setCarregando(false);
  }

  async function handleEsqueciSenha() {
    setErro(""); setAviso("");
    if (!email.trim()) { setErro("Digite seu e-mail ali em cima primeiro, aí clique em \"Esqueci minha senha\" de novo."); return; }
    setCarregando(true);
    const { error } = await sb.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.href });
    setCarregando(false);
    if (error) { setErro("Erro ao enviar: " + error.message); return; }
    setAviso("Te mandamos um e-mail com um link pra você criar uma senha nova. Pode demorar alguns minutos e olhar o spam também.");
  }

  async function handleLogin() {
    setErro(""); setAviso("");
    if (!email.trim() || !senha) { setErro("Preencha e-mail e senha."); return; }
    setCarregando(true);
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password: senha });
      if (error) { setErro(traduzErroAuth(error)); setCarregando(false); return; }
      // Garante que existe uma linha de perfil pra essa decoradora (caso o cadastro
      // tenha sido feito antes da confirmação de e-mail).
      const { data: perfilExistente } = await sb.from("decoradoras").select("id").eq("id", data.user.id).maybeSingle();
      if (!perfilExistente) {
        await sb.from("decoradoras").insert({ id: data.user.id, nome_loja: nomeLoja.trim() || "Minha Loja", email: email.trim() });
      }
      onAuthed();
    } catch (err) {
      setErro("Erro inesperado: " + err.message);
    }
    setCarregando(false);
  }

  function traduzErroAuth(error) {
    const msg = error.message || "";
    if (msg.includes("Invalid login credentials")) return "E-mail ou senha incorretos.";
    if (msg.includes("already registered")) return "Já existe uma conta com esse e-mail. Tente entrar em vez de cadastrar.";
    if (msg.includes("Password should be")) return "A senha precisa ter pelo menos 6 caracteres.";
    return msg;
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden" style={{ background: `linear-gradient(160deg, ${BRAND.azul} 0%, ${BRAND.azulEscuro} 100%)` }}>
      <div className="absolute -top-10 -left-10 w-40 h-40 rounded-full opacity-30" style={{ background: BRAND.rosa }} />
      <div className="absolute top-24 right-10 w-24 h-24 rounded-full opacity-30" style={{ background: BRAND.amarelo }} />
      <div className="relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
        <div className="flex flex-col items-center mb-6">
          <img src={"data:image/png;base64," + LOGO_B64} alt="App Decore" className="w-40 h-auto mb-2" />
          <p className="text-sm font-bold text-center mt-1 tracking-wide">
            <span style={{ color: BRAND.rosa }}>PLANEJE.</span>{" "}
            <span style={{ color: "#C4B5FD" }}>ORGANIZE.</span>{" "}
            <span style={{ color: BRAND.azul }}>ENCANTE.</span>
          </p>
        </div>

        <div className="grid grid-cols-2 gap-2 mb-5 p-1 rounded-xl" style={{ background: BRAND.bg }}>
          <button onClick={() => { setModo("login"); setErro(""); setAviso(""); }} className="py-2 rounded-lg text-sm font-bold cursor-pointer" style={modo === "login" ? { background: "#fff", color: BRAND.azul } : { color: "#94a3b8" }}>Entrar</button>
          <button onClick={() => { setModo("cadastro"); setErro(""); setAviso(""); }} className="py-2 rounded-lg text-sm font-bold cursor-pointer" style={modo === "cadastro" ? { background: "#fff", color: BRAND.azul } : { color: "#94a3b8" }}>Criar conta</button>

/* ============================================================
   TELA DE NOVA SENHA (aberta quando a pessoa clica no link do e-mail)
============================================================ */
function ResetPasswordScreen({ onDone }) {
  const [senha, setSenha] = useState("");
  const [senha2, setSenha2] = useState("");
  const [carregando, setCarregando] = useState(false);
  const [erro, setErro] = useState("");

  async function handleSalvar() {
    setErro("");
    if (senha.length < 6) { setErro("A senha precisa ter pelo menos 6 caracteres."); return; }
    if (senha !== senha2) { setErro("As duas senhas digitadas são diferentes."); return; }
    setCarregando(true);
    const { error } = await sb.auth.updateUser({ password: senha });
    setCarregando(false);
    if (error) { setErro("Erro ao salvar: " + error.message); return; }
    onDone();
  }

  return (
    <div className="min-h-screen flex items-center justify-center p-6" style={{ background: `linear-gradient(160deg, ${BRAND.azul} 0%, ${BRAND.azulEscuro} 100%)` }}>
      <div className="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
        <div className="flex flex-col items-center mb-6">
          <div className="text-3xl mb-2">🔑</div>
          <h1 className="fredoka text-xl font-bold text-center" style={{ color: BRAND.azul }}>Crie sua nova senha</h1>
        </div>
        <Field label="Nova senha" hint="Mínimo de 6 caracteres.">
          <input className={inputClass} type="password" value={senha} onChange={(e) => setSenha(e.target.value)} placeholder="••••••" />
        </Field>
        <Field label="Confirme a nova senha">
          <input className={inputClass} type="password" value={senha2} onChange={(e) => setSenha2(e.target.value)} placeholder="••••••" />
        </Field>
        <ErrorBox>{erro}</ErrorBox>
        <button disabled={carregando} onClick={handleSalvar} className="w-full py-3 rounded-xl font-bold text-white cursor-pointer active:scale-95 transition disabled:opacity-60" style={{ background: BRAND.rosa }}>
          {carregando ? "Salvando..." : "Salvar nova senha"}
        </button>
      </div>
    </div>
  );
}

/* ============================================================

============================================================ */
function SignaturePad({ value, onChange }) {
  const canvasRef = useRef(null);
  const drawingRef = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });
  const hasDrawnRef = useRef(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = BRAND.tinta;
    if (value) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = value;
      hasDrawnRef.current = true;
    }
  }, []);

  function getPos(e) {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
  }
  function start(e) { e.preventDefault(); drawingRef.current = true; lastPos.current = getPos(e); }
  function move(e) {
    if (!drawingRef.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    lastPos.current = pos; hasDrawnRef.current = true;
  }
  function end() {
    if (!drawingRef.current) return;
    drawingRef.current = false;
    if (hasDrawnRef.current) onChange(canvasRef.current.toDataURL("image/png"));
  }
  function clear() {
    const canvas = canvasRef.current;
    canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    hasDrawnRef.current = false;
    onChange("");
  }

  return (
    <div>
      <canvas ref={canvasRef} width={480} height={160} className="w-full rounded-xl bg-white" style={{ border: "2px dashed #e2e8f0", cursor: "crosshair", touchAction: "none" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
      <button type="button" onClick={clear} className="text-xs font-semibold text-rose-400 hover:text-rose-500 mt-2 cursor-pointer">Limpar e assinar de novo</button>
    </div>
  );
}

const MAX_LOGO_BYTES = 1.5 * 1024 * 1024;

// Redimensiona uma imagem no navegador antes de guardar, pra fotos de
// estoque não pesarem o banco de dados (várias peças = várias fotos).
function redimensionarImagem(file, larguraMaxima) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const escala = Math.min(1, larguraMaxima / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * escala;
        canvas.height = img.height * escala;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.8));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function ContratoTab({ userId, profile, onProfileUpdate }) {
  const [mostrarConfigLink, setMostrarConfigLink] = useState(false);
  const [contracts, setContracts] = useState([]);
  const [carregando, setCarregando] = useState(true);
  const [form, setForm] = useState(CAMPOS_VAZIOS);
  const [editingId, setEditingId] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [erro, setErro] = useState("");
  const [salvo, setSalvo] = useState(false);
  const [busca, setBusca] = useState("");
  const [mostrarSugestoes, setMostrarSugestoes] = useState(false);
  const [salvando, setSalvando] = useState(false);
  const [estoqueItens, setEstoqueItens] = useState([]);
  const [modoMaterial, setModoMaterial] = useState("estoque"); // 'estoque' | 'manual'
  const [buscaMaterialContrato, setBuscaMaterialContrato] = useState("");
  const [itensSelecionados, setItensSelecionados] = useState({}); // { estoqueItemId: quantidade }
  const [itensSelecionadosOriginais, setItensSelecionadosOriginais] = useState({}); // como estava quando abriu (pra saber o que mudou)
  const [confirmarExclusao, setConfirmarExclusao] = useState(null); // contrato aguardando confirmação de exclusão

  useEffect(() => {
    sb.from("estoque_itens").select("*").eq("decoradora_id", userId).order("material", { ascending: true }).then(({ data }) => {
      const itens = data || [];
      setEstoqueItens(itens);
      if (itens.length === 0) setModoMaterial("manual"); // sem estoque cadastrado, já começa no modo digitado
    });
  }, [userId]);

  const carregarContratos = useCallback(async () => {
    setCarregando(true);
    const { data, error } = await sb.from("contracts").select("*").eq("decoradora_id", userId).order("created_at", { ascending: false });
    if (!error && data) setContracts(data.map(contractFromDb));
    setCarregando(false);
    if (!data || data.length === 0) setShowForm(true);
  }, [userId]);

  useEffect(() => { carregarContratos(); }, [carregarContratos]);

  function set(field, value) { setForm((f) => ({ ...f, [field]: value })); }

  function maxDisponivel(item) {
    // pode selecionar até o que já está disponível, mais o que esse contrato já tinha reservado antes (se estiver editando)
    return item.quantidade + (itensSelecionadosOriginais[item.id] || 0);
  }

  function mudarQuantidadeItem(item, delta) {
    setItensSelecionados((sel) => {
      const atual = sel[item.id] || 0;
      const novo = Math.max(0, Math.min(maxDisponivel(item), atual + delta));
      const novaSelecao = { ...sel };
      if (novo === 0) delete novaSelecao[item.id]; else novaSelecao[item.id] = novo;
      const rotulos = Object.entries(novaSelecao).map(([id, qtd]) => {
        const it = estoqueItens.find((x) => x.id === id);
        return it ? `${qtd}x ${it.material}${it.modelo ? ` (${it.modelo})` : ""}` : null;
      }).filter(Boolean);
      set("materialEntregue", rotulos.join(", "));
      return novaSelecao;
    });
  }

  const clientesAnteriores = useMemo(() => {
    const map = {};
    contracts.forEach((c) => {
      if (editingId && c.id === editingId) return;
      const key = normalizeStr(c.contratanteNome);
      if (!key) return;
      if (!map[key]) map[key] = { nome: c.contratanteNome, cpf: c.contratanteCPF, endereco: c.contratanteEndereco, whatsapp: c.contratanteWhatsapp, count: 0, lastCreatedAt: 0 };
      map[key].count += 1;
      if ((c.createdAt || 0) >= map[key].lastCreatedAt) {
        map[key].lastCreatedAt = c.createdAt || 0;
        map[key].cpf = c.contratanteCPF; map[key].endereco = c.contratanteEndereco; map[key].whatsapp = c.contratanteWhatsapp;
      }
    });
    return map;
  }, [contracts, editingId]);

  const sugestoesNome = useMemo(() => {
    const termo = normalizeStr(form.contratanteNome);
    if (!termo || termo.length < 2) return [];
    return Object.values(clientesAnteriores).filter((cl) => normalizeStr(cl.nome).includes(termo) && normalizeStr(cl.nome) !== termo).slice(0, 5);
  }, [form.contratanteNome, clientesAnteriores]);

  const clienteRepetido = clientesAnteriores[normalizeStr(form.contratanteNome)];

  useEffect(() => {
    if (editingId) return;
    const match = clientesAnteriores[normalizeStr(form.contratanteNome)];
    if (!match) return;
    setForm((f) => {
      if (f.contratanteCPF.trim() || f.contratanteEndereco.trim() || f.contratanteWhatsapp.trim()) return f;
      return { ...f, contratanteCPF: match.cpf || f.contratanteCPF, contratanteEndereco: match.endereco || f.contratanteEndereco, contratanteWhatsapp: match.whatsapp || f.contratanteWhatsapp };
    });
  }, [form.contratanteNome, clientesAnteriores, editingId]);

  function selecionarCliente(cl) {
    setForm((f) => ({ ...f, contratanteNome: cl.nome, contratanteCPF: cl.cpf || f.contratanteCPF, contratanteEndereco: cl.endereco || f.contratanteEndereco, contratanteWhatsapp: cl.whatsapp || f.contratanteWhatsapp }));
    setMostrarSugestoes(false);
  }

  function startNew() { setForm(CAMPOS_VAZIOS); setEditingId(null); setErro(""); setSalvo(false); setShowForm(true); setItensSelecionados({}); setItensSelecionadosOriginais({}); setModoMaterial(estoqueItens.length > 0 ? "estoque" : "manual"); }
  async function editContract(c) {
    const valorSinalCalculado = c.sinalPercentualContrato ? (parseValorBR(c.valor) * Number(c.sinalPercentualContrato) / 100).toFixed(2).replace(".", ",") : "";
    setForm({ ...CAMPOS_VAZIOS, ...c, valorSinal: valorSinalCalculado }); setEditingId(c.id); setErro(""); setSalvo(false); setShowForm(true);
    const { data } = await sb.from("contract_estoque_itens").select("estoque_item_id, quantidade").eq("contract_id", c.id);
    const mapa = {};
    (data || []).forEach((r) => { mapa[r.estoque_item_id] = r.quantidade; });
    setItensSelecionados(mapa); setItensSelecionadosOriginais(mapa);
    setModoMaterial(Object.keys(mapa).length > 0 ? "estoque" : "manual");
  }

  async function handleSave() {
    setErro(""); setSalvo(false);
    const faltando = [];
    if (!form.contratanteNome.trim()) faltando.push("nome do contratante");
    if (!form.produtoNome.trim()) faltando.push("nome do produto");
    if (!String(form.valor).trim()) faltando.push("valor");
    if (!form.dataRetirada && form.tipoServico !== "baloes") faltando.push("data de retirada");
    if (faltando.length > 0) { setErro("Preencha antes: " + faltando.join(", ") + "."); return; }
    setSalvando(true);
    const id = editingId || uid();
    const row = contractToDb({ ...form, id }, userId);
    const { error } = await sb.from("contracts").upsert(row);
    if (error) { setSalvando(false); setErro("Erro ao salvar: " + error.message); return; }

    // Ajusta o estoque conforme a quantidade de cada material mudou.
    const todosOsIds = new Set([...Object.keys(itensSelecionadosOriginais), ...Object.keys(itensSelecionados)]);
    let mexeuNoEstoque = false;
    for (const itemId of todosOsIds) {
      const antes = itensSelecionadosOriginais[itemId] || 0;
      const agora = itensSelecionados[itemId] || 0;
      const delta = agora - antes; // positivo = usando mais (desconta), negativo = usando menos (devolve)
      if (delta !== 0) {
        mexeuNoEstoque = true;
        const item = estoqueItens.find((it) => it.id === itemId);
        if (item) await sb.from("estoque_itens").update({ quantidade: Math.max(0, item.quantidade - delta) }).eq("id", itemId);
      }
      if (agora > 0) {
        await sb.from("contract_estoque_itens").upsert({ id: uid(), contract_id: id, decoradora_id: userId, estoque_item_id: itemId, quantidade: agora }, { onConflict: "contract_id,estoque_item_id" });
      } else {
        await sb.from("contract_estoque_itens").delete().eq("contract_id", id).eq("estoque_item_id", itemId);
      }
    }
    if (mexeuNoEstoque) {
      const { data: estoqueAtualizado } = await sb.from("estoque_itens").select("*").eq("decoradora_id", userId).order("material", { ascending: true });
      setEstoqueItens(estoqueAtualizado || []);
    }

    setSalvando(false);
    await carregarContratos();
    setSalvo(true); setShowForm(false);
  }

  async function removeContract(c) {
    if (!c.devolvido) {
      const { data: links } = await sb.from("contract_estoque_itens").select("*").eq("contract_id", c.id);
      for (const link of links || []) {
        const { data: item } = await sb.from("estoque_itens").select("quantidade").eq("id", link.estoque_item_id).maybeSingle();
        if (item) await sb.from("estoque_itens").update({ quantidade: item.quantidade + link.quantidade }).eq("id", link.estoque_item_id);
      }
    }
    const { error } = await sb.from("contracts").delete().eq("id", c.id);
    if (error) { setErro("Erro ao excluir: " + error.message); return; }
    setConfirmarExclusao(null);
    await carregarContratos();
  }

  function handlePrint() {
    try {
      const html = buildContractHtml(form, profile);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    } catch (err) { setErro("Não consegui gerar o contrato: " + err.message); }
  }

  function handleSendWhatsapp(c) {
    if (!c.contratanteWhatsapp) { setErro("Esse contrato não tem WhatsApp cadastrado."); return; }
    const fin = computeFinance(c, pctSinalEfetivo(c, profile));
    const base = window.location.href.replace(/[^/]*$/, "");
    const link = `${base}ver-contrato.html?id=${encodeURIComponent(c.id)}`;
    const msg = [
      `Olá, ${c.contratanteNome}! Aqui é da ${profile.nome_loja}.`,
      `Segue o resumo do seu contrato:`, `Produto: ${c.produtoNome}`,
      `Valor: ${formatBRL(fin.valor)} (pago: ${formatBRL(fin.pago)} · falta: ${formatBRL(fin.pendente)})`,
      `${labelData(c.tipoServico, "ida")}: ${c.dataRetirada ? formatDateLong(c.dataRetirada) : "-"} das ${c.horaRetiradaIni} às ${c.horaRetiradaFim}`,
      `${labelData(c.tipoServico, "volta")}: ${c.dataDevolucao ? formatDateLong(c.dataDevolucao) : "-"} das ${c.horaDevolucaoIni} às ${c.horaDevolucaoFim}`,
      ``, `Segue o contrato completo para assinar:`, link,
      ``, `Qualquer dúvida, me chama! 🎉`,
    ].join("\n");
    window.open(whatsappLink(c.contratanteWhatsapp, msg), "_blank");
  }

  const ordered = [...contracts].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)).filter((c) => !busca.trim() || normalizeStr(c.contratanteNome).includes(normalizeStr(busca)));

  if (carregando) return <Carregando texto="Carregando contratos..." />;

  return (
    <div className="max-w-5xl mx-auto px-4 sm:px-5 py-6 sm:py-7">
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5">
        <div><h2 className="fredoka text-xl font-bold" style={{ color: BRAND.tinta }}>Preencher contrato</h2>
        <p className="text-sm text-slate-400">O texto já vem pronto — você só troca os campos que mudam.</p></div>
        <div className="flex gap-2 shrink-0">
          <button onClick={() => setMostrarConfigLink(true)} className="flex items-center gap-1.5 px-3 sm:px-4 py-2.5 rounded-xl font-bold text-sm active:scale-95 transition cursor-pointer" style={{ color: BRAND.azul, background: BRAND.azul + "12", minHeight: 44 }}>🔗 Link de assinatura</button>
          {!showForm && <button onClick={startNew} className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl font-bold text-white text-sm active:scale-95 transition cursor-pointer" style={{ background: BRAND.rosa, minHeight: 44 }}>+ Novo</button>}
        </div>
      </div>

      {showForm ? (
        <div className="grid lg:grid-cols-2 gap-6">
          <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 h-fit">
            <p className="font-bold text-sm mb-4" style={{ color: BRAND.rosa }}>Dados que mudam a cada contrato</p>
            <Field label="Tipo de serviço">
              <div className="grid grid-cols-2 gap-2">
                {[
                  { v: "pegue_monte", l: "Pegue e Monte" }, { v: "decoracao", l: "Decoração" },
                  { v: "baloes", l: "Balões" }, { v: "pecas_avulsas", l: "Peças avulsas" },
                  ...(profile.tipos_customizados || []).map((t) => ({ v: t, l: t })),
                ].map((op) => (
                  <button type="button" key={op.v} onClick={() => set("tipoServico", op.v)} className="py-2 rounded-xl text-sm font-bold border-2 transition cursor-pointer" style={form.tipoServico === op.v ? { background: BRAND.azul, borderColor: BRAND.azul, color: "#fff" } : { borderColor: "#e2e8f0", color: BRAND.tinta }}>{op.l}</button>
                ))}
              </div>
            </Field>
            <Field label="Nome do contratante">
              <div className="relative">
                <input className={inputClass} value={form.contratanteNome} onChange={(e) => { set("contratanteNome", e.target.value); setMostrarSugestoes(true); }} onFocus={() => setMostrarSugestoes(true)} onBlur={() => setTimeout(() => setMostrarSugestoes(false), 150)} autoComplete="off" />
                {mostrarSugestoes && sugestoesNome.length > 0 && (
                  <div className="absolute z-10 left-0 right-0 mt-1 bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden">
                    {sugestoesNome.map((cl) => (
                      <button type="button" key={cl.nome} onMouseDown={(e) => { e.preventDefault(); selecionarCliente(cl); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-50 flex items-center justify-between gap-2 cursor-pointer">
                        <span className="text-sm font-medium truncate" style={{ color: BRAND.tinta }}>{cl.nome}</span>
                        <span className="text-[11px] font-bold shrink-0 px-2 py-0.5 rounded-full" style={{ background: BRAND.turquesa + "20", color: BRAND.turquesa }}>{cl.count} festa{cl.count > 1 ? "s" : ""}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
              {clienteRepetido && <p className="text-xs font-semibold mt-1.5" style={{ color: BRAND.turquesa }}>🎉 Esse cliente já fechou {clienteRepetido.count} festa{clienteRepetido.count > 1 ? "s" : ""} com a gente!</p>}
            </Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="CPF"><input className={inputClass} value={form.contratanteCPF} onChange={(e) => set("contratanteCPF", e.target.value)} /></Field>
              <Field label="Valor do produto"><input className={inputClass} value={form.valor} onChange={(e) => set("valor", e.target.value.replace(/[^0-9.,]/g, ""))} placeholder="90,00" /></Field>
            </div>
            <Field label="Multa por atraso na devolução (%)" hint={form.semMulta ? "Multa desativada pra este contrato" : "Cobrada por hora de atraso. Deixe em branco pra usar 10% (padrão)"}>
              <div className="flex items-center gap-2 mb-2">
                <input type="checkbox" id="semMulta" checked={!!form.semMulta} onChange={(e) => set("semMulta", e.target.checked)} className="w-4 h-4 rounded cursor-pointer" style={{ accentColor: BRAND.azul }} />
                <label htmlFor="semMulta" className="text-xs font-semibold cursor-pointer" style={{ color: BRAND.tinta }}>Não cobrar multa por atraso neste contrato</label>
              </div>
              <input className={inputClass} value={form.multaPercentual} onChange={(e) => set("multaPercentual", e.target.value.replace(/[^0-9]/g, ""))} placeholder="10" disabled={!!form.semMulta} style={form.semMulta ? { opacity: 0.4, cursor: "not-allowed" } : {}} />
            </Field>
            <Field label="Valor do sinal (R$)" hint={form.valorSinal && parseValorBR(form.valor) > 0 ? `= ${Math.round((parseValorBR(form.valorSinal) / parseValorBR(form.valor)) * 100)}% do valor do produto` : "Opcional — deixe em branco pra usar o percentual padrão da loja"}>
              <input
                className={inputClass}
                value={form.valorSinal}
                onChange={(e) => {
                  const v = e.target.value.replace(/[^0-9.,]/g, "");
                  const novo = { ...form, valorSinal: v };
                  const valorTotal = parseValorBR(form.valor);
                  if (v && valorTotal > 0) novo.sinalPercentualContrato = String(Math.round((parseValorBR(v) / valorTotal) * 100));
                  else novo.sinalPercentualContrato = "";
                  setForm(novo);
                }}
                placeholder="Ex: 45,00"
              />
            </Field>
            <Field label="Endereço do contratante"><input className={inputClass} value={form.contratanteEndereco} onChange={(e) => set("contratanteEndereco", e.target.value)} /></Field>
            <Field label="WhatsApp do contratante" hint="Com DDD"><input className={inputClass} value={form.contratanteWhatsapp} onChange={(e) => set("contratanteWhatsapp", e.target.value)} placeholder="(61) 99999-8888" /></Field>
            <Field label="Nome do produto"><input className={inputClass} value={form.produtoNome} onChange={(e) => set("produtoNome", e.target.value)} /></Field>
            <Field label="Material entregue">
              <div className="grid grid-cols-2 gap-2 mb-2">
                <button type="button" onClick={() => { setModoMaterial("estoque"); set("materialEntregue", ""); }} className="py-2 rounded-xl text-xs font-bold border-2 transition cursor-pointer" style={modoMaterial === "estoque" ? { background: BRAND.azul, borderColor: BRAND.azul, color: "#fff" } : { borderColor: "#e2e8f0", color: BRAND.tinta }}>📦 Usar do estoque</button>
                <button type="button" onClick={() => { setModoMaterial("manual"); setItensSelecionados({}); }} className="py-2 rounded-xl text-xs font-bold border-2 transition cursor-pointer" style={modoMaterial === "manual" ? { background: BRAND.azul, borderColor: BRAND.azul, color: "#fff" } : { borderColor: "#e2e8f0", color: BRAND.tinta }}>✏️ Digitar manualmente</button>
              </div>

              {modoMaterial === "manual" ? (
                <input className={inputClass} value={form.materialEntregue} onChange={(e) => set("materialEntregue", e.target.value)} placeholder="Ex: Painel redondo 50x50, mini arco de balões..." />
              ) : estoqueItens.length === 0 ? (
                <p className="text-xs text-slate-400 bg-slate-50 rounded-xl px-3 py-2.5">Você ainda não cadastrou nada no Estoque. Vá no card "📦 Estoque" pra cadastrar seus materiais, ou use "Digitar manualmente" acima.</p>
              ) : (
                <div className="bg-slate-50 rounded-xl p-3 max-h-80 overflow-y-auto">
                  <div className="relative mb-2">
                    <input className={inputClass + " pl-9 bg-white"} placeholder="Buscar material..." value={buscaMaterialContrato} onChange={(e) => setBuscaMaterialContrato(e.target.value)} />
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
                  </div>
                  <div className="space-y-1">
                  {estoqueItens.filter((item) => item.material.toLowerCase().includes(buscaMaterialContrato.trim().toLowerCase())).length === 0 && (
                    <p className="text-xs text-slate-400 text-center py-3">Nenhum material encontrado.</p>
                  )}
                  {estoqueItens.filter((item) => item.material.toLowerCase().includes(buscaMaterialContrato.trim().toLowerCase())).map((item) => {
                    const disponivel = maxDisponivel(item);
                    const semEstoque = disponivel <= 0;
                    const qtdSelecionada = itensSelecionados[item.id] || 0;
                    return (
                      <div key={item.id} className="w-full flex items-center gap-2 px-2.5 py-2 rounded-lg" style={qtdSelecionada > 0 ? { background: BRAND.azul + "18" } : { background: "transparent" }}>
                        {item.foto_data_url ? (
                          <img src={item.foto_data_url} loading="lazy" className="w-7 h-7 rounded object-cover shrink-0" />
                        ) : (
                          <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background: corEstoque(item.quantidade) }} />
                        )}
                        <span className="text-sm flex-1 truncate" style={{ color: semEstoque ? "#94a3b8" : BRAND.tinta }}>{item.material}{item.modelo ? ` — ${item.modelo}` : ""}{semEstoque ? " (sem estoque)" : ` (${disponivel} disponíveis)`}</span>
                        <div className="flex items-center gap-1.5 shrink-0">
                          <button type="button" disabled={qtdSelecionada <= 0} onClick={() => mudarQuantidadeItem(item, -1)} className="w-6 h-6 rounded-md font-bold text-xs cursor-pointer disabled:opacity-30" style={{ background: "#fff", border: "1px solid #e2e8f0" }}>−</button>
                          <span className="w-5 text-center text-sm font-bold" style={{ color: BRAND.tinta }}>{qtdSelecionada}</span>
                          <button type="button" disabled={semEstoque || qtdSelecionada >= disponivel} onClick={() => mudarQuantidadeItem(item, 1)} className="w-6 h-6 rounded-md font-bold text-xs cursor-pointer disabled:opacity-30" style={{ background: "#fff", border: "1px solid #e2e8f0" }}>+</button>
                        </div>
                      </div>
                    );
                  })}
                  </div>
                </div>
              )}
            </Field>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              <Field label={labelData(form.tipoServico, "ida")} className="col-span-2 sm:col-span-1"><input type="date" className={inputClass} value={form.dataRetirada} onChange={(e) => set("dataRetirada", e.target.value)} /></Field>
              <Field label="Hora início"><input type="time" className={inputClass} value={form.horaRetiradaIni} onChange={(e) => set("horaRetiradaIni", e.target.value)} /></Field>
              <Field label="Hora fim"><input type="time" className={inputClass} value={form.horaRetiradaFim} onChange={(e) => set("horaRetiradaFim", e.target.value)} /></Field>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              <Field label={labelData(form.tipoServico, "volta")} className="col-span-2 sm:col-span-1"><input type="date" className={inputClass} value={form.dataDevolucao} onChange={(e) => set("dataDevolucao", e.target.value)} /></Field>
              <Field label="Hora início"><input type="time" className={inputClass} value={form.horaDevolucaoIni} onChange={(e) => set("horaDevolucaoIni", e.target.value)} /></Field>
              <Field label="Hora fim"><input type="time" className={inputClass} value={form.horaDevolucaoFim} onChange={(e) => set("horaDevolucaoFim", e.target.value)} /></Field>
            </div>

            <Field label="Forma de pagamento">
              <div className="grid grid-cols-4 gap-2">
                {[{ v: "Pix", l: "Pix" }, { v: "Cartão de crédito", l: "Crédito" }, { v: "Cartão de débito", l: "Débito" }, { v: "Dinheiro", l: "Dinheiro" }].map((op) => (
                  <button type="button" key={op.v} onClick={() => set("formaPagamento", op.v)} className="py-2 rounded-xl text-xs font-bold border-2 transition cursor-pointer" style={form.formaPagamento === op.v ? { background: BRAND.azul, borderColor: BRAND.azul, color: "#fff" } : { borderColor: "#e2e8f0", color: BRAND.tinta }}>{op.l}</button>
                ))}
              </div>
            </Field>
            <Field label="Status do pagamento">
              <div className="grid grid-cols-3 gap-2">
                {[{ v: "pendente", l: "Pendente" }, { v: "sinal", l: `Sinal (${pctSinalEfetivo(form, profile)}%)` }, { v: "pago", l: "Pago" }].map((op) => (
                  <button type="button" key={op.v} onClick={() => set("statusPagamento", op.v)} className="py-2 rounded-xl text-sm font-bold border-2 transition cursor-pointer" style={form.statusPagamento === op.v ? { background: BRAND.azul, borderColor: BRAND.azul, color: "#fff" } : { borderColor: "#e2e8f0", color: BRAND.tinta }}>{op.l}</button>
                ))}
              </div>
              {form.statusPagamento === "sinal" && (
                <div className="flex items-center gap-2 mt-2">
                  <span className="text-xs text-slate-400">
                    {form.valorSinal ? `Sinal de ${formatBRL(form.valorSinal)} = ` : "Usando o padrão da loja: "}
                    <b style={{ color: BRAND.tinta }}>{pctSinalEfetivo(form, profile)}%</b>
                    {!form.valorSinal && " (preencha \"Valor do sinal\" ali em cima pra usar um valor diferente)"}
                  </span>
                </div>
              )}
            </Field>
            <ErrorBox>{erro}</ErrorBox>
            <div className="flex gap-3 mt-3">
              <button type="button" disabled={salvando} onClick={handleSave} className="flex-1 py-3 rounded-xl font-bold text-white active:scale-95 transition cursor-pointer disabled:opacity-60" style={{ background: BRAND.rosa }}>{salvando ? "Salvando..." : editingId ? "Salvar alterações" : "Salvar contrato"}</button>
              {contracts.length > 0 && <button type="button" onClick={() => setShowForm(false)} className="px-5 py-3 rounded-xl font-bold text-sm text-slate-400 hover:bg-slate-50 cursor-pointer">Cancelar</button>}
            </div>
          </div>
          <div>
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <p className="font-bold text-sm" style={{ color: BRAND.azul }}>Pré-visualização</p>
              <div className="flex gap-2">
                <button onClick={handlePrint} className="flex items-center gap-1.5 text-sm font-bold px-3 py-1.5 rounded-lg cursor-pointer" style={{ color: BRAND.azul, background: BRAND.azul + "12" }}>👁 Ver / Baixar</button>
                <button onClick={() => handleSendWhatsapp(form)} className="flex items-center gap-1.5 text-sm font-bold px-3 py-1.5 rounded-lg cursor-pointer" style={{ color: "#22C35E", background: "#22C35E18" }}>📲 WhatsApp</button>
              </div>
            </div>
            <ContratoPreview dados={form} profile={profile} />
          </div>
        </div>
      ) : (
        <div className="space-y-3">
          <div className="relative">
            <input className={inputClass + " pl-10"} value={busca} onChange={(e) => setBusca(e.target.value)} placeholder="🔎 Pesquisar pelo nome do cliente..." />
          </div>
          <SuccessBox>{salvo ? "Contrato salvo! Já está na lista abaixo." : ""}</SuccessBox>
          {ordered.map((c) => {
            const fin = computeFinance(c, pctSinalEfetivo(c, profile));

/* ============================================================

============================================================ */
function ChartCanvas({ type, data, options }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  useEffect(() => {
    const ctx = canvasRef.current.getContext("2d");
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, { type, data, options: options || {} });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(data), type]);
  return <canvas ref={canvasRef} />;
}

/* ============================================================
   MÓDULO OPORTUNIDADES (Aniversários + Vale a pena lembrar)
============================================================ */
function diaDoAno2024(mes, dia) {
  try { return Math.round(new Date(2024, mes - 1, dia).getTime() / 86400000); } catch (e) { return 0; }
}
function diasAteAniversario(mes, dia) {
  const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
  let proximo = new Date(hoje.getFullYear(), mes - 1, dia);
  if (proximo < hoje) proximo = new Date(hoje.getFullYear() + 1, mes - 1, dia);
  return Math.round((proximo - hoje) / 86400000);
}
function corAniversario(dias) {
  if (dias === 0) return "#DC2626"; // hoje
  if (dias <= 3) return "#22C55E";
  if (dias <= 7) return BRAND.amarelo;
  return "#94a3b8";
}
function textoDiasAte(dias) {
  if (dias === 0) return "É hoje! 🎉";
  if (dias === 1) return "Amanhã";
  return `Em ${dias} dias`;
}

async function buscarOportunidadesAniversarios(userId) {
  const { data } = await sb.from("special_dates").select("*, contracts(contratante_nome, contratante_whatsapp)").eq("decoradora_id", userId);
  if (!data) return [];
  return data
    .map((p) => ({
      id: p.id, nome: p.person_name, parentesco: p.relationship,
      cliente: p.contracts ? p.contracts.contratante_nome : "", whatsapp: p.contracts ? p.contracts.contratante_whatsapp : "",
      dia: p.birthday_day, mes: p.birthday_month, diasAte: diasAteAniversario(p.birthday_month, p.birthday_day),
    }))
    .sort((a, b) => a.diasAte - b.diasAte);
}

async function buscarValeAPenaLembrar(userId) {
  const { data } = await sb.from("contracts").select("*").eq("decoradora_id", userId);
  if (!data) return [];
  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const diaHoje = diaDoAno2024(hoje.getMonth() + 1, hoje.getDate());
  return data
    .map(contractFromDb)
    .filter((c) => c.dataRetirada)
    .map((c) => {
      const d = parseDateLocal(c.dataRetirada);
      return { c, d, anoContrato: d.getFullYear(), diaContrato: diaDoAno2024(d.getMonth() + 1, d.getDate()) };
    })
    .filter(({ anoContrato, diaContrato }) => {
      if (anoContrato >= anoAtual) return false;
      const diff = Math.abs(diaContrato - diaHoje);
      return Math.min(diff, 366 - diff) <= 3;
    })
    .map(({ c, anoContrato }) => ({
      id: c.id, cliente: c.contratanteNome, whatsapp: c.contratanteWhatsapp, tema: c.produtoNome,
      data: c.dataRetirada, anosAtras: anoAtual - anoContrato,
    }))
    .sort((a, b) => a.anosAtras - b.anosAtras);
}

function corEstoque(qtd) {
  if (qtd <= 0) return "#DC2626";
  if (qtd <= 3) return "#F97316";
  return "#22C55E";
}

function EstoqueTab({ userId }) {
  const [itens, setItens] = useState(null);
  const [erro, setErro] = useState("");
  const [novoMaterial, setNovoMaterial] = useState("");
  const [novaQtd, setNovaQtd] = useState("");
  const [salvandoNovo, setSalvandoNovo] = useState(false);
  const [novaFoto, setNovaFoto] = useState("");
  const [observacoesMateriais, setObservacoesMateriais] = useState([]);
  const [enviandoFotoId, setEnviandoFotoId] = useState(null);
  const [busca, setBusca] = useState("");
  const [fotoAmpliada, setFotoAmpliada] = useState(null);
  const [editandoMaterial, setEditandoMaterial] = useState(null); // nome original do material sendo renomeado
  const [nomeEditado, setNomeEditado] = useState("");

  const carregar = useCallback(async () => {
    const { data } = await sb.from("estoque_itens").select("*").eq("decoradora_id", userId).order("material", { ascending: true });
    setItens(data || []);
  }, [userId]);

  useEffect(() => { carregar(); }, [carregar]);

  useEffect(() => {
    sb.from("contracts").select("id, contratante_nome, produto_nome, material_observacoes, created_at")
      .eq("decoradora_id", userId).not("material_observacoes", "is", null).neq("material_observacoes", "")
      .order("created_at", { ascending: false }).limit(10)
      .then(({ data }) => setObservacoesMateriais(data || []));
  }, [userId]);

  async function atualizarQuantidade(item, novaQuantidade) {
    const q = Math.max(0, Number(novaQuantidade) || 0);
    setItens((lista) => lista.map((i) => i.id === item.id ? { ...i, quantidade: q } : i));
    await sb.from("estoque_itens").update({ quantidade: q }).eq("id", item.id);
  }

  async function handleFotoNovoItem(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { setErro("Escolha um arquivo de imagem."); return; }
    const foto = await redimensionarImagem(file, 500);
    setNovaFoto(foto);
  }

  async function handleFotoItemExistente(item, e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { setErro("Escolha um arquivo de imagem."); return; }
    setEnviandoFotoId(item.id);
    const foto = await redimensionarImagem(file, 500);
    setItens((lista) => lista.map((i) => i.id === item.id ? { ...i, foto_data_url: foto } : i));
    await sb.from("estoque_itens").update({ foto_data_url: foto }).eq("id", item.id);
    setEnviandoFotoId(null);
  }

  async function removerFotoItem(item) {
    setItens((lista) => lista.map((i) => i.id === item.id ? { ...i, foto_data_url: null } : i));
    await sb.from("estoque_itens").update({ foto_data_url: null }).eq("id", item.id);
  }

  async function excluirItem(id) {
    setItens((lista) => lista.filter((i) => i.id !== id));
    await sb.from("estoque_itens").delete().eq("id", id);
  }

  async function adicionarItem() {
    setErro("");
    const nome = novoMaterial.trim();
    if (!nome) { setErro("Digite o nome do material."); return; }
    const jaExiste = itens.some((i) => i.material.trim().toLowerCase() === nome.toLowerCase());
    if (jaExiste) { setErro(`Você já tem "${nome}" cadastrado no estoque. Em vez de criar de novo, edite a quantidade dele ali embaixo na lista.`); return; }
    setSalvandoNovo(true);
    const row = { id: uid(), decoradora_id: userId, material: nome, modelo: "", quantidade: Math.max(0, Number(novaQtd) || 0), foto_data_url: novaFoto || null };
    const { error } = await sb.from("estoque_itens").insert(row);
    setSalvandoNovo(false);
    if (error) { setErro("Erro ao salvar: " + error.message); return; }
    setNovoMaterial(""); setNovaQtd(""); setNovaFoto("");
    await carregar();
  }

  async function renomearMaterial(nomeAntigo) {
    setErro("");
    const novo = nomeEditado.trim();
    if (!novo || novo === nomeAntigo) { setEditandoMaterial(null); return; }
    const duplicado = itens.some((i) => i.material.trim().toLowerCase() === novo.toLowerCase() && i.material !== nomeAntigo);
    if (duplicado) { setErro(`Já existe um material chamado "${novo}". Escolha outro nome.`); return; }
    const idsDoGrupo = itens.filter((i) => i.material === nomeAntigo).map((i) => i.id);
    setItens((lista) => lista.map((i) => i.material === nomeAntigo ? { ...i, material: novo } : i));
    setEditandoMaterial(null);
    await sb.from("estoque_itens").update({ material: novo }).in("id", idsDoGrupo);
  }

  if (itens === null) return <Carregando texto="Carregando estoque..." />;

  const agrupado = {};
  itens.forEach((it) => { (agrupado[it.material] = agrupado[it.material] || []).push(it); });

  return (
    <div className="max-w-5xl mx-auto px-4 sm:px-5 py-6 sm:py-7">
      <h2 className="fredoka text-xl font-bold mb-1" style={{ color: BRAND.tinta }}>📦 Estoque</h2>
      <p className="text-sm text-slate-400 mb-3">Cadastre e edite os materiais que você tem disponível.</p>

      <div className="flex flex-wrap gap-3 mb-5">
        <span className="text-xs font-semibold flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background: "#DC2626" }} />Sem estoque</span>
        <span className="text-xs font-semibold flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background: "#F97316" }} />Pouco (1 a 3)</span>
        <span className="text-xs font-semibold flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ background: "#22C55E" }} />Bom estoque (4+)</span>
      </div>

      {observacoesMateriais.length > 0 && (
        <div className="rounded-2xl p-4 mb-5" style={{ background: "#F97316" + "10", border: "2px solid #F9731655" }}>
          <p className="font-bold text-xs mb-3" style={{ color: "#B45309" }}>📝 Observações de materiais dos últimos contratos</p>
          <div className="space-y-2">
            {observacoesMateriais.map((o) => (
              <div key={o.id} className="bg-white rounded-xl p-3">
                <p className="text-sm" style={{ color: BRAND.tinta }}>{o.material_observacoes}</p>
                <p className="text-xs text-slate-400 mt-1">{o.contratante_nome} · {o.produto_nome}</p>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="bg-slate-50 rounded-2xl p-4 mb-5">
        <p className="font-bold text-xs mb-3" style={{ color: BRAND.azul }}>+ Adicionar novo material</p>
        <div className="flex gap-3 mb-3">
          <div className="shrink-0 text-center">
            <div className="w-16 h-16 rounded-xl overflow-hidden flex items-center justify-center relative" style={{ background: "#fff", border: "2px dashed #e2e8f0" }}>
              {novaFoto && <img src={novaFoto} className="w-full h-full object-cover" />}
            </div>
            <div className="flex gap-1 mt-1 justify-center">
              <label className="w-7 h-7 rounded-lg flex items-center justify-center cursor-pointer text-sm" style={{ background: BRAND.azul + "14" }} title="Tirar foto">
                📷
                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFotoNovoItem} />
              </label>
              <label className="w-7 h-7 rounded-lg flex items-center justify-center cursor-pointer text-sm" style={{ background: BRAND.azul + "14" }} title="Escolher da galeria">
                🖼️
                <input type="file" accept="image/*" className="hidden" onChange={handleFotoNovoItem} />
              </label>
            </div>
            <p className="text-[10px] text-slate-400 mt-1 w-16 leading-tight">Foto opcional</p>
          </div>
          <div className="grid sm:grid-cols-2 gap-2 flex-1">
            <input className={inputClass} placeholder="Material (ex: Arco de balões)" value={novoMaterial} onChange={(e) => setNovoMaterial(e.target.value)} />
            <input className={inputClass} type="number" min="0" placeholder="Quantidade" value={novaQtd} onChange={(e) => setNovaQtd(e.target.value)} />

        {erro && <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: BRAND.rosa+"18", color: BRAND.rosa }}>⚠️ {erro}</div>}
        <button disabled={salvandoNovo} onClick={adicionarItem} className="px-4 py-2 rounded-xl font-bold text-white text-sm cursor-pointer disabled:opacity-60" style={{ background: BRAND.azul }}>
          {salvandoNovo ? "Salvando..." : "+ Adicionar"}
        </button>
      </div>

      <div className="relative mb-4">
        <input className={inputClass + " pl-9"} placeholder="Pesquisar material..." value={busca} onChange={(e) => setBusca(e.target.value)} />

          <div key={material} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
            {editandoMaterial === material ? (
              <div className="flex items-center gap-2 mb-3">
                <input autoFocus className="flex-1 rounded-lg border-2 border-slate-200 px-2.5 py-1.5 text-sm font-bold" value={nomeEditado} onChange={(e) => setNomeEditado(e.target.value)} onKeyDown={(e) => e.key === "Enter" && renomearMaterial(material)} />
                <button onClick={() => renomearMaterial(material)} className="text-xs font-bold px-2.5 py-1.5 rounded-lg text-white cursor-pointer" style={{ background: BRAND.azul }}>Salvar</button>
                <button onClick={() => setEditandoMaterial(null)} className="text-xs font-bold px-2 py-1.5 rounded-lg text-slate-400 cursor-pointer">Cancelar</button>
              </div>
            ) : (
              <div className="flex items-center gap-2 mb-3">
                <p className="font-bold text-sm" style={{ color: BRAND.tinta }}>{material}</p>
                <button onClick={() => { setEditandoMaterial(material); setNomeEditado(material); }} className="text-slate-300 hover:text-slate-500 cursor-pointer text-xs" title="Renomear material">✏️</button>
              </div>
            )}
            <div className="space-y-2">
              {lista.map((item) => (
                <div key={item.id} className="flex items-center gap-2.5 rounded-xl p-2.5" style={{ background: corEstoque(item.quantidade) + "10" }}>
                  <div className="w-10 h-10 rounded-lg overflow-hidden flex items-center justify-center shrink-0 relative" style={{ background: "#fff", border: "1px solid #e2e8f0" }}>
                    {enviandoFotoId === item.id ? (
                      <span className="text-[9px] text-slate-400">...</span>
                    ) : item.foto_data_url ? (
                      <img src={item.foto_data_url} loading="lazy" onClick={() => setFotoAmpliada(item.foto_data_url)} className="w-full h-full object-cover cursor-zoom-in" />
                    ) : (
                      <span className="text-sm">📷</span>
                    )}
                  </div>
                  <div className="flex flex-col gap-0.5 shrink-0">
                    <label className="w-6 h-6 rounded-md flex items-center justify-center cursor-pointer text-[11px]" style={{ background: BRAND.azul + "14" }} title="Tirar foto">
                      📷
                      <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleFotoItemExistente(item, e)} />
                    </label>
                    <label className="w-6 h-6 rounded-md flex items-center justify-center cursor-pointer text-[11px]" style={{ background: BRAND.azul + "14" }} title="Escolher da galeria">
                      🖼️
                      <input type="file" accept="image/*" className="hidden" onChange={(e) => handleFotoItemExistente(item, e)} />
                    </label>
                  </div>
                  <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ background: corEstoque(item.quantidade) }} />
                  <span className="text-sm flex-1 truncate" style={{ color: BRAND.tinta }}>{item.modelo}</span>
                  <div className="flex items-center gap-1 shrink-0">
                    <button onClick={() => atualizarQuantidade(item, item.quantidade - 1)} className="w-7 h-7 rounded-lg font-bold cursor-pointer" style={{ background: "#fff", border: "1px solid #e2e8f0" }}>−</button>
                    <input type="number" className="w-14 text-center rounded-lg border-2 border-slate-200 py-1 text-sm font-bold" value={item.quantidade} onChange={(e) => atualizarQuantidade(item, e.target.value)} />
                    <button onClick={() => atualizarQuantidade(item, item.quantidade + 1)} className="w-7 h-7 rounded-lg font-bold cursor-pointer" style={{ background: "#fff", border: "1px solid #e2e8f0" }}>+</button>
                  </div>
                  {item.foto_data_url && <button onClick={() => removerFotoItem(item)} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 cursor-pointer shrink-0" title="Remover foto">🖼️✕</button>}
                  <button onClick={() => excluirItem(item.id)} className="p-1.5 rounded-lg hover:bg-rose-50 text-rose-400 cursor-pointer shrink-0">🗑</button>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      {fotoAmpliada && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,.85)" }} onClick={() => setFotoAmpliada(null)}>
          <img src={fotoAmpliada} className="max-w-full max-h-full rounded-2xl object-contain" />
          <button onClick={() => setFotoAmpliada(null)} className="absolute top-4 right-4 w-10 h-10 rounded-full flex items-center justify-center text-white text-xl cursor-pointer" style={{ background: "rgba(255,255,255,.15)" }}>✕</button>
        </div>
      )}
    </div>
  );
}

function FinanceiroTab({ userId, profile }) {
  const [contracts, setContracts] = useState([]);
  const [despesas, setDespesas] = useState([]);
  const [carregando, setCarregando] = useState(true);
  const [activeDetail, setActiveDetail] = useState(null);
  const [novaDespesa, setNovaDespesa] = useState({ descricao: "", categoria: "baloes", valor: "", data: todayISO() });
  const [erroDespesa, setErroDespesa] = useState("");
  const [salvandoDespesa, setSalvandoDespesa] = useState(false);

  const carregarDespesas = useCallback(async () => {
    const { data } = await sb.from("despesas").select("*").eq("decoradora_id", userId).order("data", { ascending: false });
    setDespesas(data || []);
  }, [userId]);

  useEffect(() => {
    (async () => {
      const { data } = await sb.from("contracts").select("*").eq("decoradora_id", userId).order("created_at", { ascending: false });
      setContracts((data || []).map(contractFromDb));
      await carregarDespesas();
      setCarregando(false);
    })();
  }, [userId, carregarDespesas]);

  async function handleSaveDespesa() {
    setErroDespesa("");
    if (!novaDespesa.descricao.trim()) { setErroDespesa("Descreva o que foi gasto."); return; }
    if (!parseValorBR(novaDespesa.valor)) { setErroDespesa("Preencha o valor gasto."); return; }
    setSalvandoDespesa(true);
    const { error } = await sb.from("despesas").insert({
      id: uid(), decoradora_id: userId, descricao: novaDespesa.descricao.trim(),
      categoria: novaDespesa.categoria, valor: parseValorBR(novaDespesa.valor), data: novaDespesa.data,
    });
    setSalvandoDespesa(false);
    if (error) { setErroDespesa("Erro ao salvar: " + error.message); return; }
    setNovaDespesa({ descricao: "", categoria: "baloes", valor: "", data: todayISO() });
    await carregarDespesas();
  }

  async function handleDeleteDespesa(id) {
    await sb.from("despesas").delete().eq("id", id);
    await carregarDespesas();
  }

  const totals = useMemo(() => {
    let recebido = 0, pendente = 0, faturado = 0;
    contracts.forEach((c) => { const f = computeFinanceFaturamento(c, pctSinalEfetivo(c, profile)); recebido += f.pago; pendente += f.pendente; faturado += f.valor; });
    return { recebido, pendente, faturado };
  }, [contracts, profile.sinal_percentual]);

  const totalSaidas = useMemo(() => despesas.reduce((s, d) => s + (Number(d.valor) || 0), 0), [despesas]);
  const lucroLiquido = totals.recebido - totalSaidas;
  const CATEGORIAS_DESPESA = { baloes: "Balões", materiais: "Materiais", transporte: "Transporte", mao_de_obra: "Mão de obra", outros: "Outros" };

  const MESES_ABREV = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const porMes = useMemo(() => {
    const map = {};
    const pct = Number(profile.sinal_percentual) || 50;
    function add(date, value) {
      if (!date || !value) return;
      const key = `${date.getFullYear()}-${date.getMonth()}`;
      if (!map[key]) map[key] = { mes: MESES_ABREV[date.getMonth()], total: 0, order: date.getFullYear()*12+date.getMonth() };
      map[key].total += value;
    }
    contracts.forEach((c) => {
      const valor = parseValorBR(c.valor);
      const dAssinatura = c.createdAt ? new Date(c.createdAt) : null;
      const dEvento = c.dataRetirada ? parseDateLocal(c.dataRetirada) : null;
      if (c.statusPagamento === "pago") add(dAssinatura, valor);
      else if (c.statusPagamento === "sinal") { add(dAssinatura, valor*(pct/100)); add(dEvento, valor*(1-pct/100)); }
    });
    return Object.values(map).sort((a,b) => a.order-b.order).slice(-6);
  }, [contracts, profile.sinal_percentual]);

  const porTipoServico = useMemo(() => {
    const map = {};
    contracts.forEach((c) => {
      const key = c.tipoServico || "pegue_monte";
      if (!map[key]) map[key] = { tipo: TIPO_SERVICO_LABELS[key] || key, total: 0, qtd: 0 };
      map[key].total += parseValorBR(c.valor);
      map[key].qtd += 1;
    });
    return Object.values(map).sort((a,b) => b.total-a.total);
  }, [contracts]);

  const produtosRanking = useMemo(() => {
    const map = {};
    contracts.forEach((c) => { const n = c.produtoNome || "Sem nome"; map[n] = (map[n]||0)+1; });
    return Object.entries(map).map(([name,value]) => ({name,value})).sort((a,b)=>b.value-a.value).slice(0,6);
  }, [contracts]);

  const aReceberLista = useMemo(() => contracts.filter((c) => computeFinanceFaturamento(c, pctSinalEfetivo(c, profile)).pendente > 0).sort((a,b) => (a.dataRetirada||"").localeCompare(b.dataRetirada||"")), [contracts, profile.sinal_percentual]);
  const recebidoLista = useMemo(() => contracts.filter((c) => computeFinanceFaturamento(c, pctSinalEfetivo(c, profile)).pago > 0).sort((a,b) => (b.createdAt||0)-(a.createdAt||0)), [contracts, profile.sinal_percentual]);
  const faturadoLista = useMemo(() => [...contracts].sort((a,b) => (b.createdAt||0)-(a.createdAt||0)), [contracts]);

  const PIE_CORES = [BRAND.rosa, BRAND.amarelo, BRAND.turquesa, BRAND.roxo, "#3D5AFE", "#F97316"];

  if (carregando) return <Carregando texto="Carregando financeiro..." />;
  if (contracts.length === 0) return <div className="max-w-5xl mx-auto px-5 py-16 text-center text-slate-400">💰<p className="mt-3">Preencha um contrato pro financeiro começar a aparecer.</p></div>;

  const listaAtiva = activeDetail === "recebido" ? recebidoLista : activeDetail === "pendente" ? aReceberLista : faturadoLista;

  return (
    <div className="max-w-5xl mx-auto px-4 sm:px-5 py-6 sm:py-7">
      <h2 className="fredoka text-xl font-bold mb-1" style={{ color: BRAND.tinta }}>Financeiro</h2>
      <p className="text-sm text-slate-400 mb-5">Puxado automaticamente dos contratos preenchidos.</p>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
        <StatCard emoji="💰" label="Já recebido" value={formatBRL(totals.recebido)} color={BRAND.turquesa} active={activeDetail==="recebido"} onClick={() => setActiveDetail(activeDetail==="recebido"?null:"recebido")} />
        <StatCard emoji="⏳" label="A receber" value={formatBRL(totals.pendente)} color={BRAND.rosa} active={activeDetail==="pendente"} onClick={() => setActiveDetail(activeDetail==="pendente"?null:"pendente")} />
        <StatCard emoji="📈" label="Faturamento total" value={formatBRL(totals.faturado)} color={BRAND.azul} active={activeDetail==="faturado"} onClick={() => setActiveDetail(activeDetail==="faturado"?null:"faturado")} />
        <StatCard emoji="📦" label="Contratos" value={contracts.length} color={BRAND.amarelo} active={activeDetail==="contratos"} onClick={() => setActiveDetail(activeDetail==="contratos"?null:"contratos")} />
      </div>

      <div className="grid grid-cols-2 gap-4 mb-4">
        <StatCard emoji="🧾" label="Saídas (gastos)" value={formatBRL(totalSaidas)} color="#F97316" active={activeDetail==="saidas"} onClick={() => setActiveDetail(activeDetail==="saidas"?null:"saidas")} />
        <StatCard emoji={lucroLiquido >= 0 ? "✅" : "⚠️"} label="Lucro líquido (recebido − saídas)" value={formatBRL(lucroLiquido)} color={lucroLiquido >= 0 ? BRAND.turquesa : BRAND.rosa} />
      </div>

      {activeDetail && activeDetail !== "saidas" && (
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-6">
          <div className="flex items-center justify-between mb-4">
            <p className="font-bold text-sm" style={{ color: BRAND.tinta }}>
              {activeDetail === "recebido" && "De onde veio o que já foi recebido"}
              {activeDetail === "pendente" && "Quem ainda falta pagar"}
              {(activeDetail === "faturado" || activeDetail === "contratos") && "Todos os contratos"}
            </p>
            <button onClick={() => setActiveDetail(null)} className="p-1.5 rounded-lg hover:bg-slate-50 cursor-pointer text-slate-400">✕</button>
          </div>
          <div className="space-y-2">
            {listaAtiva.map((c) => {
              const f = computeFinanceFaturamento(c, pctSinalEfetivo(c, profile));
              const valorMostrado = activeDetail === "recebido" ? f.pago : activeDetail === "pendente" ? f.pendente : f.valor;
              const cor = activeDetail === "pendente" ? BRAND.rosa : activeDetail === "recebido" ? BRAND.turquesa : BRAND.azul;
              return (
                <div key={c.id} className="flex items-center justify-between py-2.5 border-b border-slate-50 last:border-0">
                  <div className="min-w-0">
                    <p className="font-semibold text-sm truncate" style={{ color: BRAND.tinta }}>{c.contratanteNome}</p>
                    <p className="text-xs text-slate-400 truncate">{c.produtoNome} · {formatDateBR(c.dataRetirada)}</p>
                  </div>
                  <span className="font-bold text-sm shrink-0 ml-3" style={{ color: cor }}>{formatBRL(valorMostrado)}</span>
                </div>
              );
            })}
            {listaAtiva.length === 0 && <p className="text-sm text-slate-400">Nada por aqui ainda.</p>}
          </div>
        </div>
      )}

      {activeDetail === "saidas" && (
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-6">
          <div className="flex items-center justify-between mb-4">
            <p className="font-bold text-sm" style={{ color: BRAND.tinta }}>Saídas / gastos</p>
            <button onClick={() => setActiveDetail(null)} className="p-1.5 rounded-lg hover:bg-slate-50 cursor-pointer text-slate-400">✕</button>
          </div>

          <div className="bg-slate-50 rounded-xl p-4 mb-4">
            <p className="font-bold text-xs mb-3" style={{ color: "#F97316" }}>Registrar nova saída</p>
            <div className="grid sm:grid-cols-2 gap-3 mb-3">
              <input className="rounded-xl border-2 border-slate-200 px-3 py-2.5 text-sm" placeholder="O que foi? (ex: pacote de balões)" value={novaDespesa.descricao} onChange={(e) => setNovaDespesa((d) => ({ ...d, descricao: e.target.value }))} />
              <input className="rounded-xl border-2 border-slate-200 px-3 py-2.5 text-sm" placeholder="Valor gasto (ex: 45,00)" value={novaDespesa.valor} onChange={(e) => setNovaDespesa((d) => ({ ...d, valor: e.target.value.replace(/[^0-9.,]/g,"") }))} />
            </div>
            <div className="grid sm:grid-cols-2 gap-3 mb-3">
              <select className="rounded-xl border-2 border-slate-200 px-3 py-2.5 text-sm cursor-pointer" value={novaDespesa.categoria} onChange={(e) => setNovaDespesa((d) => ({ ...d, categoria: e.target.value }))}>
                {Object.entries(CATEGORIAS_DESPESA).map(([v,l]) => <option key={v} value={v}>{l}</option>)}
              </select>
              <input type="date" className="rounded-xl border-2 border-slate-200 px-3 py-2.5 text-sm" value={novaDespesa.data} onChange={(e) => setNovaDespesa((d) => ({ ...d, data: e.target.value }))} />
            </div>
            {erroDespesa && <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "#F9731618", color: "#F97316" }}>⚠️ {erroDespesa}</div>}
            <button disabled={salvandoDespesa} onClick={handleSaveDespesa} className="w-full py-2.5 rounded-xl font-bold text-white text-sm cursor-pointer disabled:opacity-60" style={{ background: "#F97316" }}>
              {salvandoDespesa ? "Salvando..." : "+ Adicionar saída"}
            </button>
          </div>

          <div className="space-y-2">
            {despesas.map((d) => (
              <div key={d.id} className="flex items-center justify-between py-2.5 border-b border-slate-50 last:border-0">
                <div className="min-w-0">
                  <p className="font-semibold text-sm truncate" style={{ color: BRAND.tinta }}>{d.descricao}</p>
                  <p className="text-xs text-slate-400 truncate">{CATEGORIAS_DESPESA[d.categoria] || d.categoria} · {formatDateBR(d.data)}</p>
                </div>
                <div className="flex items-center gap-2 shrink-0 ml-3">
                  <span className="font-bold text-sm" style={{ color: "#F97316" }}>− {formatBRL(d.valor)}</span>
                  <button onClick={() => handleDeleteDespesa(d.id)} className="p-1.5 rounded-lg hover:bg-rose-50 text-rose-400 cursor-pointer">🗑</button>
                </div>
              </div>
            ))}
            {despesas.length === 0 && <p className="text-sm text-slate-400">Nenhuma saída registrada ainda.</p>}
          </div>
        </div>
      )}

      <div className="grid lg:grid-cols-2 gap-5 mb-5">
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <p className="font-bold text-sm" style={{ color: BRAND.tinta }}>Dinheiro recebido por mês</p>
          <p className="text-xs text-slate-400 mb-4">O sinal entra no mês do contrato, o restante no mês do evento.</p>
          <div style={{ height: 220 }}>
            <ChartCanvas type="bar" data={{ labels: porMes.map(m=>m.mes), datasets: [{ data: porMes.map(m=>m.total), backgroundColor: BRAND.azul, borderRadius: 8, maxBarThickness: 42 }] }}
              options={{ plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: (v) => formatBRL(v) } } }, maintainAspectRatio: false }} />
          </div>
        </div>
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
          <p className="font-bold text-sm mb-4" style={{ color: BRAND.tinta }}>Produtos mais vendidos</p>
          <div style={{ height: 220 }}>
            <ChartCanvas type="doughnut" data={{ labels: produtosRanking.map(p=>p.name), datasets: [{ data: produtosRanking.map(p=>p.value), backgroundColor: PIE_CORES }] }}
              options={{ maintainAspectRatio: false, plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 10 } } } } }} />
          </div>
        </div>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-6">
        <p className="font-bold text-sm" style={{ color: BRAND.tinta }}>Balanço por tipo de serviço</p>
        <p className="text-xs text-slate-400 mb-4">O que mais saiu: Pegue e Monte, Decoração, Balões ou Peças avulsas.</p>
        <div style={{ height: 220 }}>
          <ChartCanvas type="bar" data={{ labels: porTipoServico.map(t=>t.tipo), datasets: [{ data: porTipoServico.map(t=>t.total), backgroundColor: PIE_CORES, borderRadius: 8, maxBarThickness: 60 }] }}
            options={{ plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: (v) => formatBRL(v) } } }, maintainAspectRatio: false }} />
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ABA AGENDA
